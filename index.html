<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>л°”лӢӨкұ°л¶ҒмҠӨн”„ нҸүкІ°л¶Җ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink-bg:#16222d;
  --ink-bg-2:#1d2e3b;
  --paper:#ece2c8;
  --paper-2:#e0d4ae;
  --gold:#b8923f;
  --stamp-red:#a23a2c;
  --teal:#2e6c5e;
  --amber:#b87c2e;
  --violet:#4a3a7a;
  --text-ink:#241c12;
  --text-onink:#e8dfc6;
  --text-soft:#6b5e47;
  --text-soft-onink:#93a4b0;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(circle at 12% 0%, rgba(184,146,63,0.08), transparent 45%), var(--ink-bg);
  color:var(--text-onink);
  font-family:'Noto Sans KR', sans-serif;
  min-height:100vh;
  -webkit-tap-highlight-color: transparent;
}
.mono{font-family:'IBM Plex Mono', monospace;}
.serif{font-family:'Nanum Myeongjo', serif;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ---- layout ---- */
.wrap{max-width:560px;margin:0 auto;padding:0 16px 80px;}
.hdr{max-width:560px;margin:0 auto;padding:22px 16px 16px;border-bottom:1px solid rgba(184,146,63,0.35);}
.hdr-top{display:flex;align-items:center;gap:12px;}
.brandmark svg{width:46px;height:46px;display:block;}
.hdr-title h1{font-family:'Nanum Myeongjo', serif;font-size:21px;font-weight:800;margin:0;letter-spacing:0.5px;color:var(--text-onink);}
.hdr-title .sub{font-size:11.5px;color:var(--text-soft-onink);margin-top:2px;letter-spacing:0.3px;}
.user-badge{margin-top:14px;display:flex;align-items:center;justify-content:space-between;background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.3);border-radius:999px;padding:8px 8px 8px 14px;}
.user-badge .who{font-size:13.5px;}
.user-badge .role-tag{font-size:11px;padding:3px 9px;border-radius:999px;margin-left:8px;font-family:'IBM Plex Mono', monospace;letter-spacing:0.3px;}
.role-tag.judge{background:rgba(46,108,94,0.25);color:#9fd8c6;border:1px solid rgba(46,108,94,0.5);}
.role-tag.player{background:rgba(162,58,44,0.22);color:#e7b4a7;border:1px solid rgba(162,58,44,0.45);}
.role-tag.questioner{background:rgba(74,58,122,0.3);color:#c4b8e8;border:1px solid rgba(74,58,122,0.5);}
.user-badge button{background:transparent;border:none;color:var(--text-soft-onink);font-size:11.5px;text-decoration:underline;padding:6px 8px;}

/* ---- nav tabs (кё°лҠҘ м „нҷҳ) ---- */
.main-nav{display:flex;gap:6px;padding:14px 16px 0;max-width:560px;margin:0 auto;overflow-x:auto;}
.main-nav::-webkit-scrollbar{height:0;}
.nav-btn{flex:0 0 auto;padding:8px 14px;border-radius:999px;border:1.5px solid rgba(184,146,63,0.35);background:transparent;color:var(--text-soft-onink);font-size:12.5px;font-weight:600;white-space:nowrap;}
.nav-btn.active{background:var(--gold);color:var(--ink-bg);border-color:var(--gold);}
.nav-badge{display:inline-block;background:var(--stamp-red);color:#fff;border-radius:999px;font-size:10px;padding:1px 5px;margin-left:4px;font-family:'IBM Plex Mono', monospace;}

section{margin-top:22px;}
.section-label{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.section-label .no{font-family:'IBM Plex Mono', monospace;color:var(--gold);font-size:12px;}
.section-label .name{font-family:'Nanum Myeongjo', serif;font-size:15.5px;font-weight:700;color:var(--text-onink);}

/* ---- cards ---- */
.card{background:var(--paper);color:var(--text-ink);border-radius:var(--radius);padding:18px;box-shadow:0 10px 24px -12px rgba(0,0,0,0.55);position:relative;}
.card+.card{margin-top:12px;}
.card.empty{text-align:center;font-size:13.5px;border:1px dashed rgba(107,94,71,0.4);background:transparent;color:var(--text-soft-onink);}
.card.dark{background:var(--ink-bg-2);color:var(--text-onink);border:1px solid rgba(184,146,63,0.25);}

/* ---- status pill ---- */
.poll-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.poll-head .tag{font-family:'IBM Plex Mono', monospace;font-size:10.5px;color:var(--text-soft);letter-spacing:0.4px;}
.poll-head h3{font-family:'Nanum Myeongjo', serif;font-size:17px;margin:4px 0 2px;line-height:1.3;}
.poll-meta{font-size:11.5px;color:var(--text-soft);margin-bottom:14px;}
.status-pill{font-size:10.5px;padding:3px 8px;border-radius:999px;white-space:nowrap;font-family:'IBM Plex Mono', monospace;}
.status-pill.open{background:rgba(46,108,94,0.18);color:var(--teal);border:1px solid rgba(46,108,94,0.4);}
.status-pill.closed{background:rgba(162,58,44,0.14);color:var(--stamp-red);border:1px solid rgba(162,58,44,0.35);}
.status-pill.pending{background:rgba(184,146,63,0.18);color:var(--gold);border:1px solid rgba(184,146,63,0.4);}
.status-pill.approved{background:rgba(46,108,94,0.18);color:var(--teal);border:1px solid rgba(46,108,94,0.4);}
.status-pill.rejected{background:rgba(162,58,44,0.14);color:var(--stamp-red);border:1px solid rgba(162,58,44,0.35);}
.status-pill.objected{background:rgba(74,58,122,0.25);color:#c4b8e8;border:1px solid rgba(74,58,122,0.45);}

.hairline{border-top:1px solid rgba(107,94,71,0.25);margin:14px 0;}

/* ---- score input ---- */
.score-row{display:grid;grid-template-columns:64px 1fr 32px;align-items:center;gap:10px;margin-bottom:10px;}
.score-row label{font-size:13px;font-weight:600;}
.score-row input[type=range]{width:100%;accent-color:var(--stamp-red);}
.score-row output{font-family:'IBM Plex Mono', monospace;font-size:13px;text-align:right;}
.btn{border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:700;width:100%;margin-top:6px;}
.btn-primary{background:var(--text-ink);color:var(--paper);}
.btn-secondary{background:transparent;color:var(--text-ink);border:1.5px solid rgba(36,28,18,0.4);}
.btn-ghost{background:transparent;color:var(--text-soft-onink);border:1px dashed rgba(147,164,176,0.5);}
.btn-danger{background:transparent;color:var(--stamp-red);border:1.5px solid rgba(162,58,44,0.45);}
.btn-approve{background:var(--teal);color:#fff;border:none;}
.btn-reject{background:var(--stamp-red);color:#fff;border:none;}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{margin-top:0;}

.consent-buttons{display:flex;gap:10px;}
.btn-yes,.btn-no{flex:1;padding:14px 8px;border-radius:10px;font-size:14.5px;font-weight:700;border:1.5px solid transparent;background:rgba(0,0,0,0.04);color:var(--text-ink);}
.btn-yes.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn-no.active{background:var(--stamp-red);color:#fff;border-color:var(--stamp-red);}

.tally-line{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;color:var(--text-soft);}
.bar-track{height:8px;border-radius:99px;background:rgba(107,94,71,0.18);overflow:hidden;margin-bottom:14px;}
.bar-fill{height:100%;border-radius:99px;}
.bar-fill.teal{background:var(--teal);}
.bar-fill.red{background:var(--stamp-red);}

.evaltable{width:100%;font-size:12px;border-collapse:collapse;margin-top:8px;}
.evaltable th,.evaltable td{padding:4px 5px;text-align:center;border-bottom:1px solid rgba(107,94,71,0.18);}
.evaltable th{color:var(--text-soft);font-weight:600;font-size:10.5px;}
.evaltable td.name{text-align:left;font-weight:600;}
.pass-yes{color:var(--teal);font-weight:700;}
.pass-no{color:var(--stamp-red);font-weight:700;}

details.raw{margin-top:10px;font-size:12.5px;}
details.raw summary{cursor:pointer;color:var(--text-soft);font-size:12px;}

/* ---- seal ---- */
.seal-wrap{display:flex;flex-direction:column;align-items:center;margin:6px 0 4px;}
.seal{width:148px;height:148px;transform:rotate(-4deg);animation:stampDown .55s ease-out;}
@keyframes stampDown{0%{transform:scale(1.55) rotate(-12deg);opacity:0;}60%{transform:scale(0.94) rotate(2deg);opacity:1;}100%{transform:scale(1) rotate(-4deg);opacity:1;}}
@media (prefers-reduced-motion: reduce){.seal{animation:none;}}
.seal-ring-outer{fill:none;stroke-width:3;}
.seal-ring-inner{fill:none;stroke-width:1.4;}
.seal.tone-pass .seal-ring-outer,.seal.tone-pass .seal-ring-inner,.seal.tone-pass .seal-main-text,.seal.tone-pass .seal-arctext,.seal.tone-pass .seal-turtle{stroke:var(--teal);fill:var(--teal);}
.seal.tone-fail .seal-ring-outer,.seal.tone-fail .seal-ring-inner,.seal.tone-fail .seal-main-text,.seal.tone-fail .seal-arctext,.seal.tone-fail .seal-turtle{stroke:var(--stamp-red);fill:var(--stamp-red);}
.seal.tone-neutral .seal-ring-outer,.seal.tone-neutral .seal-ring-inner,.seal.tone-neutral .seal-main-text,.seal.tone-neutral .seal-arctext,.seal.tone-neutral .seal-turtle{stroke:var(--gold);fill:var(--gold);}
.seal-turtle ellipse,.seal-turtle path,.seal-turtle circle{fill:inherit;}
.seal-arctext{font-family:'IBM Plex Mono', monospace;font-size:9px;letter-spacing:1px;}
.seal-main-text{font-family:'Nanum Myeongjo', serif;font-size:18px;font-weight:800;text-anchor:middle;}
.seal-sub-text{font-family:'IBM Plex Mono', monospace;font-size:8.5px;text-anchor:middle;}

/* ---- composer ---- */
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;}
.tabs::-webkit-scrollbar{height:0;}
.tab-btn{flex:0 0 auto;padding:9px 12px;border-radius:9px;border:1.5px solid rgba(36,28,18,0.25);background:transparent;color:var(--text-ink);font-size:13px;font-weight:700;}
.tab-btn.active{background:var(--text-ink);color:var(--paper);border-color:var(--text-ink);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px;color:var(--text-ink);}
.field .hint{font-size:11px;color:var(--text-soft);margin-top:4px;}
.field input[type=text],.field input[type=number],.field select,.field textarea{width:100%;padding:10px 11px;border-radius:9px;border:1.5px solid rgba(36,28,18,0.25);background:var(--paper-2);color:var(--text-ink);font-size:13.5px;}
.field textarea{resize:vertical;min-height:80px;line-height:1.5;}
.checkrow{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-top:6px;}

/* ---- history ---- */
.hist-item{background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.25);border-radius:11px;padding:12px 14px;margin-bottom:9px;}
.hist-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.hist-top .title{font-size:13.5px;font-weight:600;color:var(--text-onink);}
.hist-stamp{font-family:'IBM Plex Mono', monospace;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700;}
.hist-stamp.pass{background:rgba(46,108,94,0.22);color:#9fd8c6;}
.hist-stamp.fail{background:rgba(162,58,44,0.2);color:#e7b4a7;}
.hist-stamp.neutral{background:rgba(184,146,63,0.2);color:#e8c87a;}
.hist-sub{font-size:11px;color:var(--text-soft-onink);margin-top:5px;font-family:'IBM Plex Mono', monospace;}

/* ---- roster ---- */
.chip-group{margin-bottom:10px;}
.chip-group .cap{font-size:11px;color:var(--text-soft-onink);margin-bottom:6px;font-family:'IBM Plex Mono', monospace;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:12px;padding:5px 11px;border-radius:999px;background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.3);color:var(--text-onink);}
.chip.chief{border-color:var(--gold);color:var(--gold);}

/* ---- approval items ---- */
.approval-item{background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.25);border-radius:12px;padding:14px;margin-bottom:10px;}
.approval-item .a-type{font-family:'IBM Plex Mono', monospace;font-size:10.5px;color:var(--text-soft-onink);margin-bottom:4px;}
.approval-item .a-title{font-size:14px;font-weight:700;color:var(--text-onink);margin-bottom:6px;line-height:1.4;}
.approval-item .a-body{font-size:12.5px;color:var(--text-soft-onink);margin-bottom:10px;line-height:1.5;white-space:pre-wrap;background:rgba(0,0,0,0.2);border-radius:8px;padding:10px;}
.approval-item .a-meta{font-size:11px;color:var(--text-soft-onink);margin-bottom:10px;}
.a-reason{font-size:12.5px;color:var(--text-soft-onink);background:rgba(162,58,44,0.15);border:1px solid rgba(162,58,44,0.3);border-radius:8px;padding:10px;margin-bottom:10px;line-height:1.5;}
.a-reason.violet{background:rgba(74,58,122,0.2);border-color:rgba(74,58,122,0.35);color:#c4b8e8;}
.a-reason.green{background:rgba(46,108,94,0.2);border-color:rgba(46,108,94,0.35);color:#7dd9c8;}
.a-objection{font-size:12.5px;background:rgba(74,58,122,0.15);border:1px solid rgba(74,58,122,0.35);border-radius:8px;padding:10px;margin-bottom:10px;line-height:1.5;color:#c4b8e8;}
.notify-banner{background:rgba(184,146,63,0.15);border:1px solid rgba(184,146,63,0.35);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:12.5px;color:var(--gold);line-height:1.5;}

/* ---- question items ---- */
.question-item{background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.2);border-radius:11px;padding:12px 14px;margin-bottom:8px;}
.q-num{font-family:'IBM Plex Mono', monospace;font-size:10.5px;color:var(--gold);margin-bottom:3px;}
.q-text{font-size:13.5px;color:var(--text-onink);font-weight:600;margin-bottom:5px;}
.q-answer{font-size:12.5px;color:var(--text-soft-onink);background:rgba(0,0,0,0.25);border-radius:7px;padding:8px 10px;margin-top:6px;}
.q-answer .answer-label{font-family:'IBM Plex Mono', monospace;font-size:10px;color:var(--teal);margin-bottom:3px;}
.q-rejected-banner{font-size:12.5px;background:rgba(162,58,44,0.2);border:1.5px solid rgba(162,58,44,0.4);border-radius:8px;padding:10px 12px;margin-top:8px;color:#ff9999;line-height:1.5;}

/* ---- chief badge ---- */
.chief-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(184,146,63,0.15);border:1px solid rgba(184,146,63,0.4);border-radius:999px;padding:4px 10px;font-size:11px;color:var(--gold);font-family:'IBM Plex Mono', monospace;}

/* ---- join screen ---- */
.join-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.join-card{max-width:380px;width:100%;background:var(--paper);color:var(--text-ink);border-radius:18px;padding:30px 26px 26px;box-shadow:0 20px 50px -20px rgba(0,0,0,0.6);text-align:center;}
.join-card .brandmark{margin:0 auto 14px;width:64px;}
.join-card .brandmark svg{width:64px;height:64px;}
.join-card h1{font-family:'Nanum Myeongjo', serif;font-size:21px;margin:0 0 6px;}
.join-card .tagline{font-size:12.5px;color:var(--text-soft);margin:0 0 22px;line-height:1.5;}
.join-card form{text-align:left;}
.join-card label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px;}
.join-card input[type=text]{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid rgba(36,28,18,0.3);background:var(--paper-2);font-size:14px;margin-bottom:16px;}
fieldset.role-pick{border:none;padding:0;margin:0 0 18px;}
fieldset.role-pick legend{font-size:12.5px;font-weight:700;margin-bottom:8px;padding:0;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.role-opt{display:flex;align-items:center;gap:6px;border:1.5px solid rgba(36,28,18,0.25);border-radius:9px;padding:9px 10px;font-size:13px;cursor:pointer;}
.role-opt input{accent-color:var(--text-ink);}
.share-hint{margin-top:18px;font-size:11px;color:var(--text-soft);border-top:1px dashed rgba(107,94,71,0.35);padding-top:14px;line-height:1.5;}

footer.legal-footnote{max-width:560px;margin:36px auto 0;padding:0 16px 28px;font-size:10.5px;color:var(--text-soft-onink);line-height:1.6;text-align:center;}
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

import {
  getAuth,
  signInAnonymously
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {

  authDomain: "seaturtle-7512b.firebaseapp.com",
  projectId: "seaturtle-7512b",
  storageBucket: "seaturtle-7512b.firebasestorage.app",
  messagingSenderId: "51660619646",
  appId: "1:51660619646:web:47c3af6bfa1bcd66d5fd2f",
  measurementId: "G-LERN2VE51Q"
};


// Initialize Firebase
const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);

window.auth = auth;

try {
  const cred = await signInAnonymously(auth);

  console.log("Anonymous auth success");
  console.log("UID =", cred.user.uid);

} catch (e) {
  console.error(e);
}
// --------- error overlay (show runtime errors in-page) ---------
function showErrorOverlay(msg,src,ln){
  try{
    var id='__err_overlay__';
    var ex=document.getElementById(id);if(!ex){ex=document.createElement('div');ex.id=id;ex.style.position='fixed';ex.style.zIndex=99999;ex.style.left='10px';ex.style.right='10px';ex.style.top='10px';ex.style.padding='12px';ex.style.background='rgba(200,40,40,0.95)';ex.style.color='#fff';ex.style.fontFamily='monospace';ex.style.fontSize='13px';ex.style.borderRadius='8px';ex.style.maxHeight='40vh';ex.style.overflow='auto';document.body.appendChild(ex);}ex.innerText='JS ERROR: '+msg+'\n@'+(src||'')+':'+(ln||'');
  }catch(e){console.error('overlay fail',e);}  
}

window.addEventListener('error',function(ev){try{showErrorOverlay(ev.message,ev.filename,ev.lineno);}catch(e){};});
window.addEventListener('unhandledrejection',function(ev){try{var msg=(ev.reason&&ev.reason.message)||String(ev.reason);showErrorOverlay('Unhandled Rejection: '+msg);}catch(e){};});
// ---------------------------------------------------------------

/* ===== audit log ===== */
async function saveAudit(action,meta){
  try{
    var id=genId();
    var entry=Object.assign({id:id,action:action,timestamp:Date.now(),actor:currentUser?{id:currentUser.id,name:currentUser.name}:null},meta||{});
    await storageSet('audit:'+id,JSON.stringify(entry));
    return entry;
  }catch(e){console.error('audit save fail',e);}
}

/* ===== chairs (м „лӢҙ нҸүк°Җмӣҗ) ===== */
async function fetchChairs(){var v=await storageGet('chairs');return safeParse(v,{});} 
async function saveChairs(obj){if(!obj) return await storageSet('chairs',null);return await storageSet('chairs',JSON.stringify(obj));}



/* ===== storage helpers ===== */
async function storageGet(key){try{const r=await window.storage.get(key,true);return r?r.value:null;}catch(e){return null;}}
async function storageSet(key,value){try{return await window.storage.set(key,value,true);}catch(e){console.error('set fail',key,e);return null;}}
async function storageDelete(key){try{await window.storage.delete(key,true);}catch(e){}}
async function storageList(prefix){try{const r=await window.storage.list(prefix,true);return(r&&r.keys)?r.keys:[];}catch(e){return[];}}
// storage polyfill using localStorage when `window.storage` is not provided
if(typeof window.storage==='undefined'){
  window.storage = {
    get: async function(key){
      try{
        const snapshot = await get(ref(db, key));
        if(snapshot && snapshot.exists()) return { value: snapshot.val() };
        return null;
      }catch(e){ console.error(e); return null; }
    },
    set: async function(key, value){
      try{
        await set(ref(db, key), typeof value === 'string' ? value : JSON.stringify(value));
        return { ok: true };
      }catch(e){ console.error(e); return { ok: false }; }
    },
    delete: async function(key){
      try{ await remove(ref(db, key)); return { ok: true }; }catch(e){ console.error(e); return { ok: false }; }
    },
    list: async function(prefix){
      try{
        const snapshot = await get(ref(db));
        if(!snapshot || !snapshot.exists()) return { keys: [] };
        const data = snapshot.val();
        const keys = Object.keys(data||{});

    }

}

/* ===== scoring logic ===== */
function computeScoreResult(votes,denom){var ids=Object.keys(votes);var breakdown=ids.map(function(id){var v=votes[id];var vals=[v.ctx,v.ctxt,v.rat,v.sim,v.det];var allAbove6=vals.every(function(x){return x>6;});var avg=vals.reduce(function(a,b){return a+b;},0)/5;var avgAbove8=avg>8;var simOk=v.sim>=7;var pass=allAbove6&&avgAbove8&&simOk;return{id:id,vals:vals,avg:avg,pass:pass};});var passCount=breakdown.filter(function(b){return b.pass;}).length;var total=denom&&denom>0?denom:ids.length;var rate=total?(passCount/total*100):0;var finalPass=rate>=60;var catAvg=CATS.map(function(c,i){if(breakdown.length===0)return 0;var sum=breakdown.reduce(function(s,b){return s+b.vals[i];},0);return sum/breakdown.length;});return{breakdown:breakdown,passCount:passCount,total:total,submitted:ids.length,rate:rate,finalPass:finalPass,catAvg:catAvg};}
function computeConsentResult(votes,denom,preset,override){
  var ids=Object.keys(votes);
  var yes=ids.filter(function(id){return votes[id]==='м°¬м„ұ';}).length;
  var no=ids.length-yes;
  var N=(denom&&denom>0)?denom:Math.max(ids.length,1);
  var required,label,pass;
  // forced override: нҶөкіј мЎ°кұҙмқҙ 'кіјл°ҳмҲҳ л°ҳлҢҖ м—ҶмқҢ'мқё кІҪмҡ°
  if(override&&override.forced){
    // кіјл°ҳмҲҳ мҙҲкіјмқҳ л°ҳлҢҖк°Җ мһҲмңјл©ҙ л¶ҖкІ°
    pass = (no <= Math.floor(N/2));
    label = 'к°•м ң н•©мқҳ (кіјл°ҳмҲҳ л°ҳлҢҖ м—ҶмқҢ кё°мӨҖ)';
    required = 'л°ҳлҢҖк°Җ кіјл°ҳмҲҳ мҙҲкіј м—¬л¶Җ нҷ•мқё';
    return{yes:yes,no:no,submitted:ids.length,N:N,required:required,label:label,pass:pass};
  }
  if(preset==='objection'){
    if(N<=1){required=1;label='н•ҙлӢ№ нҸүк°Җмһҗ 1мқёмқҳ лӢЁлҸ… кІ°м •';pass=yes>=1;}else{required=Math.floor(N/2)+1;label='мһ¬м Ғ кіјл°ҳмҲҳ ('+required+'/'+N+')';pass=yes>=required;}
  } else if(preset==='subrule'||preset==='chiefvote'){
    if(override==='twothirds'){required=Math.ceil(N*2/3);label='мһ¬м Ғ 3л¶„мқҳ 2 мқҙмғҒ ('+required+'/'+N+')';pass=yes>=required;}else{required=N;label='мһ¬м Ғ м „мӣҗ м°¬м„ұ ('+required+'/'+N+')';pass=yes>=required&&N>0;}
  } else if(preset==='submission'||preset==='qagree'){
    if(N<=1){required=1;label='лӢЁлҸ… м°¬м„ұмңјлЎң м¶©мЎұ';pass=yes>=1;}else{required=Math.max(1,Math.ceil(N*4/5));label='5л¶„мқҳ 4 мқҙмғҒ ('+required+'/'+N+')';pass=yes>=required;}
  } else {
    var pct=(override&&override.percent)?Number(override.percent):50;required=Math.max(1,Math.ceil(N*pct/100));label='м°¬м„ұ '+pct+'% мқҙмғҒ ('+required+'/'+N+')';pass=yes>=required;
  }
  return{yes:yes,no:no,submitted:ids.length,N:N,required:required,label:label,pass:pass};
}

          if(el.selectionStart!==undefined && saved.selectionStart!==undefined){
            try{ el.setSelectionRange(saved.selectionStart, saved.selectionEnd); }catch(e){}
          }
        }
      });
      // focus ліөмӣҗ
      if(appState._focusedElementId){
        var focEl=document.getElementById(appState._focusedElementId);
        if(focEl && (focEl.tagName==='INPUT'||focEl.tagName==='TEXTAREA'||focEl.tagName==='SELECT')){
          focEl.focus();
        }
      }
    }catch(e){}
  },10);
}

      el.innerHTML='<div class="seal-wrap">'+sealHtml+'</div>'+catRows+rawTable;

async function handleClosePoll(){
  var poll=appState.activePoll;if(!poll)return;
  // delegate to finalizePoll to handle closing logic
  await finalizePoll(poll);
  await refreshAll(true);
}

async function finalizePoll(poll){
  try{
    var freshVotes=await fetchVotes(poll.id);
    var result=poll.type==='score'?computeScoreResult(freshVotes,poll.denom):computeConsentResult(freshVotes,poll.denom,poll.preset,poll.override);
    // л°ҳлҢҖк°Җ 2мқё мқҙмғҒмқј кІҪмҡ° м¶ңм ңмһҗ м§ҖлӘ… м Ҳм°Ё мһҗлҸҷ мӢңмһ‘ (лЎңк·ё л°Ҹ кіөм§Җ)
    try{
      if(result.no>=2){
        await saveAudit('trigger_designate_questioner',{pollId:poll.id,no:result.no});
        await storageSet('nomination_pending',JSON.stringify({startedAt:Date.now(),triggerPollId:poll.id}));
        await createApprovalWithLog({type:'question',title:'[м¶ңм ңмһҗ м§ҖлӘ… м Ҳм°Ё мӢңмһ‘]',body:'л°ҳлҢҖ 2мқё мқҙмғҒ л°ңмғқн•ҳм—¬ м¶ңм ңмһҗ м§ҖлӘ… м Ҳм°Ёк°Җ мӢңмһ‘лҗ©лӢҲлӢӨ. нҸүк°ҖмһҘмқҙ нӣ„ліҙ мӨ‘ м„ нғқн•ҳм„ёмҡ”.',authorId:currentUser?currentUser.id:null,authorName:currentUser?currentUser.name:'мӢңмҠӨн…ң',isNotice:true});
      }
    }catch(e){console.error('nomination trigger failed',e);}    
    await closePollWithResult(poll,result);
    try{await saveAudit('poll_closed',{pollId:poll.id,result:result});}catch(e){}
    // нҸүк°ҖмһҘ м„ мһ„ нҲ¬н‘ң кІ°кіј л°ҳмҳҒ
    if(poll.preset==='chiefvote'&&result.pass&&poll.candidateId){
      await saveChief({id:poll.candidateId,name:poll.candidateName,appointedAt:Date.now()});
      try{await saveAudit('chief_assigned',{id:poll.candidateId,name:poll.candidateName,pollId:poll.id});}catch(e){}
    }
    // м „лӢҙ нҸүк°Җмӣҗ м„ мһ„ л¶ҖкІ° мӢң л°ҳлҢҖмһҗ лҰ¬мҠӨнҠё м ҖмһҘ (м¶ңм ңмһҗк°Җ м„ нғқн•ҳлҸ„лЎқ лҢҖкё°)
    if(poll.preset && poll.preset.indexOf && poll.preset.indexOf('chair:')===0 && !result.pass && freshVotes){
      try{
        var chairRole=poll.preset.split(':')[1];
        var disagreeIds=Object.keys(freshVotes).filter(function(id){return freshVotes[id]!=='м°¬м„ұ';});
        if(disagreeIds&&disagreeIds.length>0){
          var disagreePersons=disagreeIds.map(function(id){var p=appState.roster.find(function(r){return r.id===id;});return{id:id,name:p?p.name:'(м•Ң мҲҳ м—ҶмқҢ)'};});
          appState.chairAutoSelectDisagreers={role:chairRole,failedPollId:poll.id,disagreeList:disagreePersons};
          var roleLabel=chairRole==='approve'?'мҠ№мқё м „лӢҙ':chairRole==='question'?'м§Ҳл¬ё м „лӢҙ':chairRole==='answer'?'м •лӢө м „лӢҙ':chairRole==='rule'?'к·ңм№ҷ м „лӢҙ':chairRole==='approval_only'?'мҠ№мқёл§Ң м „лӢҙ':'м „лӢҙ';
          await saveAudit('chair_'+chairRole+'_failed_waitforselect',{failedPollId:poll.id,disagreeCount:disagreePersons.length,disagreeList:disagreePersons});
          await createApprovalWithLog({type:'question',title:'['+roleLabel+' нҸүк°Җмӣҗ мһ¬м„ мһ„ лҢҖкё°]',body:roleLabel+' нҸүк°Җмӣҗ м„ мһ„ л°ҳлҢҖ '+disagreePersons.length+'лӘ…: '+disagreePersons.map(function(p){return p.name;}).join(', ')+'. м¶ңм ңмһҗк°Җ лӢӨмқҢ нӣ„ліҙлҘј м„ нғқн•ҳм„ёмҡ”.',authorId:currentUser?currentUser.id:null,authorName:currentUser?currentUser.name:'мӢңмҠӨн…ң',isNotice:true});
        }
      }catch(e){console.error('chair vote fail wait for select',e);}    
    }
    // м „лӢҙ нҸүк°Җмӣҗ м„ мһ„ м„ұкіө мӢң лҚ°мқҙн„° м ҖмһҘ
    if(poll.preset && poll.preset.indexOf && poll.preset.indexOf('chair:')===0 && result.pass && poll.candidateId){
      try{
        var chairRole=poll.preset.split(':')[1];
        var chairs=await fetchChairs()||{};
        chairs[chairRole]={id:poll.candidateId,name:poll.candidateName,appointedAt:Date.now()};
        await saveChairs(chairs);
        await saveAudit('chair_assigned',{role:chairRole,id:poll.candidateId,name:poll.candidateName,pollId:poll.id});
      }catch(e){console.error('apply chair result',e);}    
    }
    // нҸүк°ҖмһҘ м„ мһ„ л¶ҖкІ° мӢң мһҗлҸҷ мһ¬мӢңлҸ„ м Ҳм°Ё
    if(poll.preset==='chiefvote' && !result.pass){
      try{
        await saveAudit('chiefvote_failed',{pollId:poll.id,yes:result.yes||0,no:result.no||0});
        // мһҗлҸҷ мһ¬л°ңмқҳ: к°„лӢЁнһҲ лҸҷмқј кё°мӨҖмңјлЎң мһ¬л°ңмқҳн•ҳлҸ„лЎқ н•Ё
        await createPollWithLog({type:'consent',preset:'chiefvote',title:'нҸүк°ҖмһҘ м„ мһ„ мһ¬мӢңлҸ„ вҖ” мһ¬л°ңмқҳ',detail:'мқҙм „ м„ мһ„м•Ҳмқҙ л¶ҖкІ°лҗҳм–ҙ мһ¬л°ңмқҳк°Җ мһҗлҸҷмңјлЎң мӢңмһ‘лҗ©лӢҲлӢӨ.',denom:poll.denom||Math.max(appState.roster.filter(function(r){return r.role==='нҸүк°Җмһҗ';}).length,1),voterRole:'нҸүк°Җмһҗ'});
      }catch(e){console.error('chiefvote retry failed',e);}    
    }
    // м§Ҳл¬ё н•©мқҳ мІҳлҰ¬
    if(poll.preset==='qagree'){
      if(result.pass && poll.proposedQuestion){
        var qs=await fetchQuestions();
        var qno=qs.length+1;
        var qObj=Object.assign({},poll.proposedQuestion,{no:qno,status:'pending'});
        qs.push(qObj);
        await saveQuestions(qs);
        await createApprovalWithLog({type:'question',title:'[мғҒм • мҷ„лЈҢ] м§Ҳл¬ё Q'+qno+' л“ұлЎқ',body:'м§Ҳл¬ёмқҙ н•©мқҳлҗҳм–ҙ мғҒм •лҗҳм—ҲмҠөлӢҲлӢӨ: '+qObj.text,authorId:currentUser?currentUser.id:null,authorName:currentUser?currentUser.name:'мӢңмҠӨн…ң',isNotice:true,relatedQuestionId:qObj.id});
      } else if(!result.pass && poll.proposedQuestion){
        await createApprovalWithLog({type:'question',title:'[мғҒм • кё°к°Ғ] м§Ҳл¬ё м ңм•Ҳ л¶Ҳк°Җ',body:'м ңм•Ҳлҗң м§Ҳл¬ёмқҙ н•©мқҳлҗҳм§Җ м•Ҡм•„ мғҒм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ. м ңм•Ҳ: '+(poll.proposedQuestion&&poll.proposedQuestion.text||'(м—ҶмқҢ)'),authorId:currentUser?currentUser.id:null,authorName:currentUser?currentUser.name:'мӢңмҠӨн…ң',isNotice:true,relatedQuestionId:poll.proposedQuestion&&poll.proposedQuestion.id});
      }
    }
  }catch(e){console.error('finalizePoll error',e);}  
}

/* ---- composer ---- */
function renderComposerSection(){
  var box=document.getElementById('composerSection');if(!box)return;
  var hasOpen=!!appState.activePoll&&appState.activePoll.status==='open';
  var judgeCount=appState.roster.filter(function(r){return r.role==='нҸүк°Җмһҗ';}).length;
  var playerCount=appState.roster.filter(function(r){return r.role==='м°ёк°Җмһҗ';}).length;

  // вҶҗ м»Өм„ң мҙҲкё°нҷ” л°©м§Җ: кё°мЎҙ form к°’ м ҖмһҘ
  var savedFormValues={};
  if(composerOpen){
    try{
      ['scoreTitle','scoreDetail','scoreDenom','scoreExpire','chiefCandidate','chiefDetail','chiefDenom','chiefTwoThirds','chiefExpire','presetSel','consentTitle','consentDetail','freePct','freeVoterRole','consentDenom','consentExpire','apTitle','apBody','chairRoleSel','chairCandidate'].forEach(function(id){
        var el=document.getElementById(id);
        if(el){
          savedFormValues[id]=(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT')?(el.type==='checkbox'?el.checked:el.value):'';
        }
      });
    }catch(e){}
  }

  if(hasOpen){
    box.innerHTML='<div class="section-label"><span class="no mono">л°ңмқҳ</span><span class="name">мғҲ мқҳм•Ҳ</span></div><div class="card empty">м§„н–ү мӨ‘мқё нҲ¬н‘ңлҘј л§Ҳк°җн•ң л’Ө мғҲ мқҳм•Ҳмқ„ л°ңмқҳн•  мҲҳ мһҲмҠөлӢҲлӢӨ.</div>';
    return;
  }
  if(!composerOpen){
    box.innerHTML='<div class="section-label"><span class="no mono">л°ңмқҳ</span><span class="name">мғҲ мқҳм•Ҳ</span></div><button id="openComposerBtn" type="button" class="btn btn-ghost">+ мғҲ мқҳм•Ҳ л°ңмқҳ</button>';
    document.getElementById('openComposerBtn').addEventListener('click',function(){composerOpen=true;renderComposerSection();});
    return;
  }

  // нғӯ кө¬м„ұ вҖ” м°ёк°ҖмһҗлҸ„ м°¬л°ҳ нҲ¬н‘ң нғӯ м ‘к·ј к°ҖлҠҘ
  var tabLabels={score:'м җмҲҳ нҸүк°Җ',consent:'м°¬л°ҳ нҲ¬н‘ң',chief:'нҸүк°ҖмһҘ м„ мһ„'};
  var tabs=isJudge()?['score','consent']:(isQuestioner()?['consent','chief']:['consent']);

  var tabsHtml='<div class="tabs">'+tabs.map(function(t){return'<button type="button" class="tab-btn'+(composerTab===t?' active':'')+'" data-tab="'+t+'">'+tabLabels[t]+'</button>';}).join('')+'</div>';

  var formHtml='';
  if(composerTab==='score'){
    if(!canCreateScorePoll()){formHtml='<p style="font-size:12.5px;color:var(--text-soft-onink);">м җмҲҳ нҸүк°Җ мқҳм•ҲмқҖ нҸүк°Җмһҗл§Ң л°ңмқҳн•  мҲҳ мһҲмҠөлӢҲлӢӨ.</p>';}
    else{formHtml='<div class="field"><label for="scoreTitle">мқҳм•Ҳ м ңлӘ©</label><input type="text" id="scoreTitle" placeholder="мҳҲ: м •лӢө нҢҗм • нҲ¬н‘ң"/></div><div class="field"><label for="scoreDetail">мғҒм„ё лӮҙмҡ©</label><textarea id="scoreDetail" placeholder="м„ нғқ: нҲ¬н‘ңмқҳ мғҒм„ён•ң м„ӨлӘ…мқ„ мһ…л Ҙн•ҳм„ёмҡ”..."/></textarea></div><div class="field"><label for="scoreDenom">кё°мӨҖ нҸүк°Җмһҗ мҲҳ (60% мӮ°м • кё°мӨҖ)</label><input type="number" id="scoreDenom" min="1" value="'+Math.max(judgeCount,1)+'"/><div class="hint">нҳ„мһ¬ л“ұлЎқлҗң нҸүк°Җмһҗ '+judgeCount+'лӘ…мқ„ кё°ліёк°’мңјлЎң мұ„мӣ мҠөлӢҲлӢӨ.</div></div><div class="field"><label for="scoreExpire">л§ҢлЈҢ(мҙҲ) - л№„мӣҢл‘җл©ҙ м—ҶмқҢ</label><input type="number" id="scoreExpire" min="10" placeholder="мҳҲ: 60"/></div><button id="submitScorePoll" type="button" class="btn btn-primary">мқҳм•Ҳ л°ңмқҳ</button>';}  
  } else if(composerTab==='chief'){
    if(!isQuestioner()){formHtml='<p style="font-size:12.5px;color:var(--text-soft-onink);">нҸүк°ҖмһҘ м„ мһ„ мқҳм•ҲмқҖ м¶ңм ңмһҗл§Ң л°ңмқҳн•  мҲҳ мһҲмҠөлӢҲлӢӨ.</p>';}
    else{
      var judges=appState.roster.filter(function(r){return r.role==='нҸүк°Җмһҗ';});
      var judgeOpts=judges.map(function(j){return'<option value="'+escapeHtml(j.id)+'">'+escapeHtml(j.name)+'</option>';}).join('');
      formHtml='<div class="field"><label for="chiefCandidate">м „лӢҙ нҸүк°Җмӣҗ нӣ„ліҙ м§ҖлӘ…</label><select id="chiefCandidate">'+(judgeOpts||'<option>нҸүк°Җмһҗ м—ҶмқҢ</option>')+'</select></div>'+
        '<div class="field"><label for="chiefDetail">мғҒм„ё лӮҙмҡ©</label><textarea id="chiefDetail" placeholder="м„ нғқ: м„ мһ„ кҙҖл Ё мғҒм„ё л©”лӘЁлҘј мһ…л Ҙн•ҳм„ёмҡ”..."></textarea></div>'+
        '<div class="field"><label for="chiefDenom">кё°мӨҖ нҸүк°Җмһҗ мҲҳ (м „мӣҗ лҸҷмқҳ н•„мҡ”)</label><input type="number" id="chiefDenom" min="1" value="'+Math.max(judgeCount,1)+'"/></div>'+
        '<div class="checkrow"><input type="checkbox" id="chiefTwoThirds"/><label for="chiefTwoThirds">м„ мһ„ м Ҳм°Ё 5нҡҢ мқҙмғҒ л°ҳліө вҶ’ 3л¶„мқҳ 2 кё°мӨҖ м Ғмҡ©</label></div>'+
        '<div class="field"><label for="chiefExpire">л§ҢлЈҢ(мҙҲ) - л№„мӣҢл‘җл©ҙ м—ҶмқҢ</label><input type="number" id="chiefExpire" min="10" placeholder="мҳҲ: 120"/></div>'+
        '<button id="submitChiefPoll" type="button" class="btn btn-primary" style="margin-top:12px;">м „лӢҙ нҸүк°Җмӣҗ м„ мһ„ мқҳм•Ҳ л°ңмқҳ</button>';
    }
  } else {
    // м—ӯн• лі„ мқҳм•Ҳ мң нҳ•
    var presetOptions=isJudge()
      ?['objection','subrule','submission','qagree','free']
      :(isQuestioner()?['submission','free']:['qagree','free']);
    var optHtml=presetOptions.map(function(p){return'<option value="'+p+'">'+PRESET_LABEL[p]+'</option>';}).join('');
    formHtml='<div class="field"><label for="preselSel">мқҳм•Ҳ мң нҳ•</label><select id="presetSel">'+optHtml+'</select></div>'+
      '<div class="field"><label for="consentTitle">мқҳм•Ҳ м ңлӘ©</label><input type="text" id="consentTitle" placeholder="мҳҲ: мқҙлІҲ м§Ҳл¬ё н•©мқҳ"/></div>'+
      '<div class="field"><label for="consentDetail">мғҒм„ё лӮҙмҡ©</label><textarea id="consentDetail" placeholder="м„ нғқ: мқҳм•Ҳм—җ лҢҖн•ң мғҒм„ён•ң м„ӨлӘ…мқ„ мһ…л Ҙн•ҳм„ёмҡ”..."></textarea></div>'+
      '<div id="presetExtra"></div>'+
      '<div class="field"><label for="consentExpire">л§ҢлЈҢ(мҙҲ) - л№„мӣҢл‘җл©ҙ м—ҶмқҢ</label><input type="number" id="consentExpire" min="10" placeholder="мҳҲ: 60"/></div>'+
      '<button id="submitConsentPoll" type="button" class="btn btn-primary">мқҳм•Ҳ л°ңмқҳ</button>';
  }

  box.innerHTML='<div class="section-label"><span class="no mono">л°ңмқҳ</span><span class="name">мғҲ мқҳм•Ҳ</span></div>'+
    '<div class="card">'+tabsHtml+formHtml+'</div>'+
    '<button id="closeComposerBtn" type="button" class="btn btn-ghost">м ‘кё°</button>';

  box.querySelectorAll('.tab-btn').forEach(function(btn){btn.addEventListener('click',function(){composerTab=btn.getAttribute('data-tab');renderComposerSection();});});
  document.getElementById('closeComposerBtn').addEventListener('click',function(){composerOpen=false;renderComposerSection();});

  if(composerTab==='score'&&canCreateScorePoll()){
    document.getElementById('submitScorePoll').addEventListener('click',async function(){
      var title=document.getElementById('scoreTitle').value.trim()||'м •лӢө нҢҗм • нҲ¬н‘ң';
      var denom=Number(document.getElementById('scoreDenom').value)||Math.max(judgeCount,1);
      var expEl=document.getElementById('scoreExpire');
      var expiresAt=expEl&&expEl.value?Date.now()+Number(expEl.value)*1000:null;
      await createPollWithLog({type:'score',title:title,detail:document.getElementById('scoreDetail')?document.getElementById('scoreDetail').value.trim():'',denom:denom,voterRole:'нҸүк°Җмһҗ',expiresAt:expiresAt});
      try{clearLocalDraft('composer:score');}catch(e){}
      composerOpen=false;await refreshAll(true);
    });
  }
  if(composerTab==='chief'&&isQuestioner()){
    var dc = null;
    try{ dc = loadLocalDraft('composer:chief'); }catch(e){}
    if(dc){
      if(document.getElementById('chiefDetail')) document.getElementById('chiefDetail').value = dc.detail||'';
      if(document.getElementById('chiefDenom')) document.getElementById('chiefDenom').value = dc.denom||document.getElementById('chiefDenom').value;
      if(document.getElementById('chiefExpire')) document.getElementById('chiefExpire').value = dc.expires||'';
      if(document.getElementById('chiefCandidate')) document.getElementById('chiefCandidate').value = dc.candidateId||document.getElementById('chiefCandidate').value;
      if(document.getElementById('chiefTwoThirds')) document.getElementById('chiefTwoThirds').checked = dc.twoThirds||false;
    }
    var dch = null;
    try{ dch = loadLocalDraft('composer:chair'); }catch(e){}
    if(dch){
      if(document.getElementById('chairRoleSel')) document.getElementById('chairRoleSel').value = dch.role||document.getElementById('chairRoleSel').value;
      if(document.getElementById('chairCandidate')) document.getElementById('chairCandidate').value = dch.candidateId||document.getElementById('chairCandidate').value;
    }
    // л°ҳлҢҖмһҗ мӨ‘ м„ нғқ UI: м „лӢҙ нҸүк°Җмӣҗ л¶ҖкІ° мӨ‘ appState.chairAutoSelectDisagreers мЎҙмһ¬
    setTimeout(function(){
      if(appState.chairAutoSelectDisagreers && appState.chairAutoSelectDisagreers.disagreeList){
        var asel=document.getElementById('chairAutoSelectDisagree');
        if(asel){
          var dlist=appState.chairAutoSelectDisagreers.disagreeList;
          var roleLabel=appState.chairAutoSelectDisagreers.role==='approve'?'мҠ№мқё':appState.chairAutoSelectDisagreers.role==='question'?'м§Ҳл¬ё':appState.chairAutoSelectDisagreers.role==='answer'?'м •лӢө':appState.chairAutoSelectDisagreers.role==='rule'?'к·ңм№ҷ':appState.chairAutoSelectDisagreers.role==='approval_only'?'мҠ№мқёл§Ң':'м „лӢҙ';
          var opts='<option value="">-- '+roleLabel+' нҸүк°Җмӣҗ л¶ҖкІ° л°ҳлҢҖмһҗ мӨ‘ м„ нғқ --</option>';
          for(var i=0;i<dlist.length;i++){
            opts+='<option value="'+escapeHtml(dlist[i].id)+'">'+escapeHtml(dlist[i].name)+'</option>';
          }
          asel.innerHTML=opts;
          asel.parentElement.style.display='block';
        }
      } else {
        var asel=document.getElementById('chairAutoSelectDisagree');
        if(asel) asel.parentElement.style.display='none';
      }
    },100);

    // л°ҳлҢҖмһҗ мӨ‘ м„ нғқ л°ңмқҳ лІ„нҠј
    var submitChairAuto=document.getElementById('submitChairAutoSelect');
    if(submitChairAuto){submitChairAuto.addEventListener('click',async function(){
      var asel=document.getElementById('chairAutoSelectDisagree');
      if(!asel||!asel.value){alert('л°ҳлҢҖмһҗ мӨ‘ нӣ„ліҙлҘј м„ нғқн•ҳм„ёмҡ”.');return;}
      var candidateId=asel.value;
      var selectedDisagree=appState.chairAutoSelectDisagreers.disagreeList.find(function(d){return d.id===candidateId;});
      if(!selectedDisagree)return;
      var roleLabel=appState.chairAutoSelectDisagreers.role==='approve'?'мҠ№мқё':appState.chairAutoSelectDisagreers.role==='question'?'м§Ҳл¬ё':appState.chairAutoSelectDisagreers.role==='answer'?'м •лӢө':appState.chairAutoSelectDisagreers.role==='rule'?'к·ңм№ҷ':appState.chairAutoSelectDisagreers.role==='approval_only'?'мҠ№мқёл§Ң':'м „лӢҙ';
      var role='chair:'+appState.chairAutoSelectDisagreers.role;
      var denom=Math.max(appState.roster.filter(function(r){return r.role==='нҸүк°Җмһҗ';}).length,1);
      try{saveLocalDraft('composer:chair',{role:role,candidateId:candidateId});}catch(e){}
      await createPollWithLog({type:'consent',preset:role,title:roleLabel+' м „лӢҙ нҸүк°Җмӣҗ мһ¬м„ мһ„ [л¶ҖкІ° л°ҳлҢҖмһҗ] вҖ” '+selectedDisagree.name,detail:'мқҙм „ '+roleLabel+' нҸүк°Җмӣҗ м„ мһ„мқҙ л¶ҖкІ°лҗҳм–ҙ л°ҳлҢҖмһҗ мӨ‘ м„ нғқлҗң нӣ„ліҙлЎң мһ¬м„ мһ„н•©лӢҲлӢӨ.',denom:denom,voterRole:'нҸүк°Җмһҗ',candidateId:candidateId,candidateName:selectedDisagree.name});
      appState.chairAutoSelectDisagreers=null;
      composerOpen=false;await refreshAll(true);
    });}

    var submitChief=document.getElementById('submitChiefPoll');
    if(submitChief) submitChief.addEventListener('click',async function(){
      var sel=document.getElementById('chiefCandidate');
      if(!sel||!sel.value)return;
      var candidateId=sel.value;
      var candidatePerson=appState.roster.find(function(r){return r.id===candidateId;});
      var candidateName=candidatePerson?candidatePerson.name:'(м•Ң мҲҳ м—ҶмқҢ)';
      var denom=Number(document.getElementById('chiefDenom').value)||Math.max(judgeCount,1);
      var twoThirds=document.getElementById('chiefTwoThirds').checked;
      var exp=document.getElementById('chiefExpire')?Number(document.getElementById('chiefExpire').value):null;
      var expiresAt=exp?Date.now()+exp*1000:null;
      await createPollWithLog({type:'consent',preset:'chiefvote',title:'нҸүк°ҖмһҘ м„ мһ„ лҸҷмқҳ вҖ” '+candidateName,detail:document.getElementById('chiefDetail')?document.getElementById('chiefDetail').value.trim():'',denom:denom,voterRole:'нҸүк°Җмһҗ',override:twoThirds?'twothirds':null,candidateId:candidateId,candidateName:candidateName,expiresAt:expiresAt});
      try{clearLocalDraft('composer:chief');}catch(e){}
      composerOpen=false;await refreshAll(true);
    });
  }
  // chair poll submit binding
  var submitChair=document.getElementById('submitChairPoll');
  if(submitChair){submitChair.addEventListener('click',async function(){
    var roleSel=document.getElementById('chairRoleSel');
    var candSel=document.getElementById('chairCandidate');
    if(!roleSel||!candSel||!candSel.value){alert('нӣ„ліҙлҘј м„ нғқн•ҳм„ёмҡ”.');return;}
    var role=roleSel.value;var candidateId=candSel.value;var candidateName=candSel.options[candSel.selectedIndex].text;
    var denom=Math.max(judgeCount,1);
    try{ saveLocalDraft('composer:chair', { role: role, candidateId: candidateId }); }catch(e){}
    var roleLabel=role==='chair:approve'?'мҠ№мқё м „лӢҙ':role==='chair:question'?'м§Ҳл¬ё м „лӢҙ':role==='chair:answer'?'м •лӢө м „лӢҙ':role==='chair:rule'?'к·ңм№ҷ м „лӢҙ':role==='chair:approval_only'?'мҠ№мқёл§Ң м „лӢҙ':'м „лӢҙ';
    await createPollWithLog({type:'consent',preset:role,title:'м „лӢҙ нҸүк°Җмӣҗ м„ мһ„ ['+roleLabel+'] вҖ” '+candidateName,detail:'м „лӢҙ нҸүк°Җмӣҗ м„ мһ„ нҲ¬н‘ң',denom:denom,voterRole:'нҸүк°Җмһҗ',candidateId:candidateId,candidateName:candidateName,expiresAt:null});
    try{clearLocalDraft('composer:chair');}catch(e){}
    composerOpen=false;await refreshAll(true);
  });}

  // м „лӢҙ нҸүк°Җмӣҗ м„ мһ„ UI (к°„лӢЁн•ң ліҙмЎ°): м¶ңм ңмһҗ лҳҗлҠ” нҸүк°Җмӣҗмқҙ нӣ„ліҙлҘј м§ҖлӘ…н•ҳм—¬ м„ мһ„ нҲ¬н‘ң мғқм„ұ
  if(composerTab==='chief' && isQuestioner()){
    var autoSelectUI='';
    if(appState.chairAutoSelectDisagreers && appState.chairAutoSelectDisagreers.disagreeList && appState.chairAutoSelectDisagreers.disagreeList.length>0){
      var roleLabel=appState.chairAutoSelectDisagreers.role==='approve'?'мҠ№мқё':appState.chairAutoSelectDisagreers.role==='question'?'м§Ҳл¬ё':appState.chairAutoSelectDisagreers.role==='answer'?'м •лӢө':appState.chairAutoSelectDisagreers.role==='rule'?'к·ңм№ҷ':appState.chairAutoSelectDisagreers.role==='approval_only'?'мҠ№мқёл§Ң':'м „лӢҙ';
      var opts='<option value="">-- '+roleLabel+' нҸүк°Җмӣҗ л¶ҖкІ° л°ҳлҢҖмһҗ мӨ‘ м„ нғқ --</option>';
      for(var i=0;i<appState.chairAutoSelectDisagreers.disagreeList.length;i++){
        var d=appState.chairAutoSelectDisagreers.disagreeList[i];
        opts+='<option value="'+escapeHtml(d.id)+'">'+escapeHtml(d.name)+'</option>';
      }
      autoSelectUI='<div style="padding:10px;background-color:#fff3cd;border-left:3px solid #ff6b6b;margin-bottom:15px;">'+
        '<div class="field"><label for="chairAutoSelectDisagree">вҡ  '+roleLabel+' нҸүк°Җмӣҗ л¶ҖкІ° л°ҳлҢҖмһҗ мӨ‘ м„ нғқ</label>'+
        '<select id="chairAutoSelectDisagree">'+opts+'</select></div>'+

        '</div>';

          '<button class="btn btn-approve btn-sm obj-accept" data-id="'+escapeHtml(a.id)+'">мқҙмқҳ мқёмҡ© (мӣҗмӢ¬ нҢҢкё°)</button>'+
          '<button class="btn btn-reject btn-sm obj-deny" data-id="'+escapeHtml(a.id)+'">мқҙмқҳ кё°к°Ғ (мӣҗмӢ¬ мң м§Җ)</button>'+

      }
    }
  }

  // м¶ңм ңмһҗ: кұ°л¶Җлҗң кІҪмҡ° мқҙмқҳм ңкё° лҳҗлҠ” мһ¬м ңм¶ң
  if(isQuestioner() && a.status==='rejected'){
    html+='<div style="margin-top:8px;">'+
      '<div class="field"><label>мқҙмқҳм ңкё° мӮ¬мң </label><textarea class="objection-text" id="objection_'+escapeHtml(a.id)+'" style="min-height:60px;" placeholder="мқҙмқҳм ңкё° мӮ¬мң лҘј лӘ…мӢңн•ҳм„ёмҡ”..."></textarea></div>'+
      '<div class="btn-row">'+
        '<button class="btn btn-secondary btn-sm raise-objection" data-id="'+escapeHtml(a.id)+'">мқҙмқҳм ңкё° м ңм¶ң</button>'+
      '</div>'+
    '</div>';
  }

  // мқҙмқҳм ңкё° мқёмҡ© нӣ„: м¶ңм ңмһҗм—җкІҢ нҶөліҙ (нҷҳмҶЎ мғҒнғң н‘ңмӢң)
  if(a.status==='approved'&&a.objectionAccepted){
    html+='<div class="notify-banner">вң… мқҙмқҳм ңкё°к°Җ мқёмҡ©лҗҳм–ҙ мһ¬мҠ№мқё мІҳлҰ¬лҗҳм—ҲмҠөлӢҲлӢӨ.</div>';
  }

  // мҠ№мқёлҗң н•ӯлӘ©м—җ лҢҖн•ҙ м¶ңм ңмһҗк°Җ мҠ№мқёмқҳ мқҙмң лҘј мһ‘м„ұн•  мҲҳ мһҲлҸ„лЎқ н•Ё
  if(a.status==='approved' && a.authorId===currentUser.id && !a.approvalReason){
    html+='<div style="margin-top:8px;">'+
      '<div class="field"><label>мҠ№мқё мқҙмң  мһ‘м„ұ (м¶ңм ңмһҗ)</label><textarea class="author-reason" id="reason_'+escapeHtml(a.id)+'" style="min-height:60px;" placeholder="мҠ№мқёлҗң лӢөліҖ/м •лӢөм—җ лҢҖн•ң м„ӨлӘ…мқ„ мһ…л Ҙн•ҳм„ёмҡ”..."></textarea></div>'+
      '<button class="btn btn-primary btn-sm submit-author-reason" data-id="'+escapeHtml(a.id)+'">мҠ№мқё мқҙмң  м ңм¶ң</button>'+

  if(isChief() && a.status==='pending'){
    html+='<div class="btn-row" style="margin-top:10px;">'+
      '<button class="btn btn-approve btn-sm chief-approve" data-id="'+escapeHtml(a.id)+'">мһ¬лҹүмңјлЎң мҠ№мқё</button>'+
      '<button class="btn btn-reject btn-sm chief-reject" data-id="'+escapeHtml(a.id)+'">мһ¬лҹүмңјлЎң кё°к°Ғ</button>'+

  html+='</div>';
  return html;
}

function attachApprovalEvents(box, aps){
  // нҸүк°Җмһҗ: мҠ№мқё лІ„нҠј
  box.querySelectorAll('.ap-approve').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // вҡ  л°©м–ҙм Ғ к¶Ңн•ң кІҖмӮ¬: нҸүк°Җмһҗл§Ң мҠ№мқё к°ҖлҠҘ (м¶ңм ңмһҗмқҳ мһҗкё° мҠ№мқё л°©м§Җ)
      if(!isJudge()){alert('мҠ№мқё к¶Ңн•ңмқҖ нҸүк°Җмһҗм—җкІҢл§Ң мһҲмҠөлӢҲлӢӨ.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      
      // ==================== Phase 2: answerEval м җмҲҳ м ҖмһҘ ====================
      if(ap.type==='answerEval' && isJudge()){
        try{
          ap.scores = ap.scores || {};
          ap.scores[currentUser.id] = {};
          CATS.forEach(function(cat){
            var scoreEl = document.getElementById('score_'+ap.id+'_'+cat.key);
            if(scoreEl){
              ap.scores[currentUser.id][cat.key] = Number(scoreEl.value) || 0;
            }
          });
          
          // лӘЁл“  нҸүк°Җмһҗ нҸүк°Җ мҷ„лЈҢ м—¬л¶Җ нҷ•мқё
          var judges = appState.roster.filter(function(r){return r.role==='нҸүк°Җмһҗ';});
          var judgesEvaluated = Object.keys(ap.scores).length;
          var totalJudges = judges.length;
          
          // лӘЁл“  нҸүк°Җмһҗ нҸүк°Җ мҷ„лЈҢ мӢң 60% н•©мқҳ кі„мӮ°
          if(judgesEvaluated === totalJudges && totalJudges > 0){
            var allScores = {};
            CATS.forEach(function(cat){allScores[cat.key]=[];});
            Object.keys(ap.scores).forEach(function(jid){
              CATS.forEach(function(cat){
                if(ap.scores[jid][cat.key] !== undefined){
                  allScores[cat.key].push(ap.scores[jid][cat.key]);
                }
              });
            });
            
            var averages = {};
            CATS.forEach(function(cat){
              var scores = allScores[cat.key];
              averages[cat.key] = scores.length>0?scores.reduce(function(a,b){return a+b;})/scores.length:0;
            });
            
            var avgAll = Object.keys(averages).reduce(function(a,k){return a+averages[k];},0)/CATS.length;
            var sim = averages['sim']||0;
            
            // м •лӢө кё°мӨҖ: лӘЁл“  н•ӯлӘ© 6м җ мҙҲкіј, нҸүк·  8м җ мҙҲкіј, мң мӮ¬м„ұ 7м җ мқҙмғҒ
            var passed = (sim >= 7) && (avgAll > 8);
            
            // нҸүк°Җмһҗлі„ кё°мӨҖ м¶©мЎұ м—¬л¶Җ кі„мӮ° (60% мқҙмғҒ н•„мҡ”)
            var judgesApproved = 0;
            Object.keys(ap.scores).forEach(function(jid){
              var jScores = ap.scores[jid];
              var jAverages = {};
              CATS.forEach(function(cat){
                jAverages[cat.key] = jScores[cat.key] || 0;
              });
              var jAvgAll = Object.keys(jAverages).reduce(function(a,k){return a+jAverages[k];},0)/CATS.length;
              var jSim = jAverages['sim']||0;
              if((jSim >= 7) && (jAvgAll > 8)){
                judgesApproved++;
              }
            });
            
            var consensusPercentage = (judgesApproved / totalJudges * 100).toFixed(2);
            var consensusPassed = judgesApproved >= Math.ceil(totalJudges * 0.6); // 60% мқҙмғҒ
            
            ap.consensus = {
              approvedCount: judgesApproved,
              totalCount: totalJudges,
              percentage: consensusPercentage,
              passed: consensusPassed,
              finalResult: consensusPassed ? 'correct' : 'incorrect'
            };
          }
          
          // м җмҲҳ draft мӮӯм ң
          try{ clearLocalDraft('approval:scores:'+ap.id); }catch(e){}
        }catch(e){console.error('score save failed', e);}
      }
      
      ap.status='approved';ap.reviewedBy=currentUser.id;ap.reviewedAt=Date.now();
      await saveApproval(ap);
      
      // вҶҗ м§Ҳл¬ё мҷ„лЈҢ: typeмқҙ 'answer'мқҙл©ҙ кҙҖл Ё м§Ҳл¬ёмқ„ 'answered' мғҒнғңлЎң м—…лҚ°мқҙнҠё
      if(ap.type==='answer' && ap.relatedQuestionId){
        try{
          var qs=await fetchQuestions();
          var q=qs.find(function(x){return x.id===ap.relatedQuestionId;});
          if(q){
            q.answer=ap.proposedAnswer||ap.body;
            q.status='answered';
            q.answerApprovedAt=Date.now();
            await saveQuestions(qs);
          }
        }catch(e){console.error('question complete failed',e);}
      }
      
      // вҶҗ м§Ҳл¬ё л°ҳл Ө мҠ№мқё: typeмқҙ 'questionReject'мқҙл©ҙ кҙҖл Ё м§Ҳл¬ёмқ„ 'rejected' мғҒнғңлЎң м—…лҚ°мқҙнҠё
      if(ap.type==='questionReject' && ap.relatedQuestionId){
        try{
          var qs=await fetchQuestions();
          var q=qs.find(function(x){return x.id===ap.relatedQuestionId;});
          if(q){
            q.status='rejected';
            q.rejectedBy=ap.authorName;
            q.rejectedAt=ap.approvedAt||Date.now();
            await saveQuestions(qs);
          }
        }catch(e){console.error('question reject failed',e);}
      }
      
      await refreshAll(true);
    });
  });
  // нҸүк°Җмһҗ: кұ°л¶Җ лІ„нҠј
  box.querySelectorAll('.ap-reject').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // вҡ  л°©м–ҙм Ғ к¶Ңн•ң кІҖмӮ¬: нҸүк°Җмһҗл§Ң кұ°л¶Җ к°ҖлҠҘ (м¶ңм ңмһҗмқҳ мһҗкё° кұ°л¶Җ л°©м§Җ)
      if(!isJudge()){alert('кұ°л¶Җ к¶Ңн•ңмқҖ нҸүк°Җмһҗм—җкІҢл§Ң мһҲмҠөлӢҲлӢӨ.');return;}
      var id=btn.getAttribute('data-id');
      var reason=prompt('кұ°л¶Җ мӮ¬мң лҘј мһ…л Ҙн•ҳм„ёмҡ” (м¶ңм ңмһҗм—җкІҢ м „лӢ¬лҗ©лӢҲлӢӨ):');
      if(reason===null)return;
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.status='rejected';ap.rejectReason=reason||'(мӮ¬мң  м—ҶмқҢ)';ap.reviewedBy=currentUser.id;ap.reviewedAt=Date.now();
      await saveApproval(ap);
      
      // вҶҗ м§Ҳл¬ё л°ҳл Ө кұ°л¶Җ: typeмқҙ 'questionReject'мқҙл©ҙ м§Ҳл¬ёмқ„ pendingмңјлЎң ліөмӣҗ
      if(ap.type==='questionReject' && ap.relatedQuestionId){
        try{
          var qs=await fetchQuestions();
          var q=qs.find(function(x){return x.id===ap.relatedQuestionId;});
          if(q && q.status==='pending'){
            q.rejectedBy=null;
            q.rejectedAt=null;
            await saveQuestions(qs);
          }
        }catch(e){console.error('question reject revert failed',e);}
      }
      
      await refreshAll(true);
    });
  });
  // м¶ңм ңмһҗ: мқҙмқҳм ңкё°
  box.querySelectorAll('.raise-objection').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var text=document.getElementById('objection_'+id);
      var body=text?text.value.trim():'';
      if(!body){alert('мқҙмқҳм ңкё° мӮ¬мң лҘј мһ…л Ҙн•ҳм„ёмҡ”.');return;}
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.status='objected';ap.objectionBody=body;ap.objectorId=currentUser.id;ap.objectorName=currentUser.name;ap.objectedAt=Date.now();
      await saveApproval(ap);

      // мқҙмқҳм ңкё° мӮ¬мӢӨмқ„ нҸүк°Җмһҗл“Өм—җкІҢ м•ҢлҰ¬лҠ” кіөм§Җ мғқм„ұ
      await createApprovalWithLog({
        type:'question', // кіөм§Җмҡ© (м•ҢлҰј)
        title:'[мқҙмқҳм ңкё° нҶөліҙ] '+ap.title,
        body:'м¶ңм ңмһҗ '+escapeHtml(currentUser.name)+'мқҙ(к°Җ) мқҙмқҳлҘј м ңкё°н–ҲмҠөлӢҲлӢӨ.\n\nмқҙмқҳ мӮ¬мң : '+body,
        authorId:currentUser.id,authorName:currentUser.name,isNotice:true,relatedId:id
      });
      await saveAudit('objection_raised',{approvalId:ap.id,objector:currentUser?currentUser.id:null});
      await refreshAll(true);
    });
  });
  // нҸүк°Җмһҗ: мӣҗмӢ¬ мқҳкІ¬ м ңм¶ң
  box.querySelectorAll('.submit-opinion').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var text=document.getElementById('opinion_'+id);
      var body=text?text.value.trim():'';
      if(!body){alert('мқҳкІ¬мқ„ мһ…л Ҙн•ҳм„ёмҡ”.');return;}
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.objectionOpinion=body;ap.opinionSubmittedAt=Date.now();
      await saveApproval(ap);await refreshAll(true);
    });
  });
  // нҸүк°Җмһҗ: мқҙмқҳ мқёмҡ©
  box.querySelectorAll('.obj-accept').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // вҡ  л°©м–ҙм Ғ к¶Ңн•ң кІҖмӮ¬: мқҙмқҳ мқёмҡ© м—¬л¶Җ кІ°м •мқҖ нҸүк°Җмһҗл§Ң к°ҖлҠҘ
      if(!isJudge()){alert('мқҙмқҳм ңкё° мқёмҡ© м—¬л¶Җ кІ°м • к¶Ңн•ңмқҖ нҸүк°Җмһҗм—җкІҢл§Ң мһҲмҠөлӢҲлӢӨ.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      var reason=prompt('мқҙмқҳ мқёмҡ©(мӣҗмӢ¬ нҢҢкё°) мӮ¬мң лҘј мһ…л Ҙн•ҳм„ёмҡ”:');
      if(reason===null||!reason.trim()){alert('мқёмҡ© мӮ¬мң лҠ” н•„мҲҳмһ…лӢҲлӢӨ.');return;}
      // мӣҗмӢ¬ нҢҢкё° вҶ’ нҷҳмҶЎ (pendingмңјлЎң лҗҳлҸҢлҰј, мқёмҡ© н‘ңмӢң)
      ap.status='pending';ap.objectionAccepted=true;ap.objectionAcceptReason=reason.trim();ap.rejectReason=null;ap.objectionBody=null;ap.objectionOpinion=null;ap.reviewedBy=null;ap.objectedAt=Date.now();
      await saveApproval(ap);await saveAudit('objection_accepted',{approvalId:ap.id,by:currentUser?currentUser.id:null,reason:ap.objectionAcceptReason});await refreshAll(true);
    });
  });
  // нҸүк°Җмһҗ: мқҙмқҳ кё°к°Ғ
  box.querySelectorAll('.obj-deny').forEach(function(btn){

      if(!isJudge()){alert('мқҙмқҳм ңкё° кё°к°Ғ м—¬л¶Җ кІ°м • к¶Ңн•ңмқҖ нҸүк°Җмһҗм—җкІҢл§Ң мһҲмҠөлӢҲлӢӨ.');return;}

      var reason=prompt('мқҙмқҳ кё°к°Ғ мӮ¬мң лҘј мһ…л Ҙн•ҳм„ёмҡ” (кё°лЎқм—җ лӮЁмҠөлӢҲлӢӨ):');
      if(reason===null||!reason.trim()){alert('кё°к°Ғ мӮ¬мң лҠ” н•„мҲҳмһ…лӢҲлӢӨ.');return;}

      await saveApproval(ap);await saveAudit('objection_denied',{approvalId:ap.id,by:currentUser?currentUser.id:null,reason:ap.objectionDenyReason});await refreshAll(true);

  // нҸүк°ҖмһҘ: мһ¬лҹүмҠ№мқё/кё°к°Ғ
  box.querySelectorAll('.chief-approve').forEach(function(btn){

  box.querySelectorAll('.chief-reject').forEach(function(btn){

      // вҶҗ м§Ҳл¬ё л°ҳл Ө мһ¬лҹү кё°к°Ғ: typeмқҙ 'questionReject'мқҙл©ҙ м§Ҳл¬ёмқ„ pendingмңјлЎң ліөмӣҗ
      if(ap.type==='questionReject' && ap.relatedQuestionId){

            q.rejectedAt=null;
            await saveQuestions(qs);
          }

      // (мқҙ к°Җл“ңк°Җ м—Ҷмңјл©ҙ н•©мқҳ мў…лЈҢ нӣ„ м¶”к°Җ нҲ¬н‘ң мӢңл§ҲлӢӨ Phase2 нҸүк°Җк°Җ мӨ‘ліө мғқм„ұлҗҳлҠ” лІ„к·ёк°Җ л°ңмғқн•Ё)
      if(!isPlayer()){alert('нҲ¬н‘ң к¶Ңн•ңмқҖ м°ёк°Җмһҗм—җкІҢл§Ң мһҲмҠөлӢҲлӢӨ.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      if(ap.status!=='pending'){alert('мқҙлҜё н•©мқҳк°Җ мў…лЈҢлҗң мқҳм•Ҳмһ…лӢҲлӢӨ.');return;}
      ap.votes = ap.votes || {};
      if(ap.votes[currentUser.id]!==undefined){alert('мқҙлҜё нҲ¬н‘ңн•ҳм…ЁмҠөлӢҲлӢӨ.');return;}
      var vote=btn.getAttribute('data-vote')==='yes'?true:false;
      
      ap.votes[currentUser.id] = vote;
      
      // 5л¶„мқҳ 4 нҲ¬н‘ңмңЁ кі„мӮ°
      var totalPlayers = appState.roster.filter(function(r){return r.role==='м°ёк°Җмһҗ';}).length;
      var yesCount = Object.keys(ap.votes).filter(function(k){return ap.votes[k]===true;}).length;
      var requiredVotes = Math.ceil(totalPlayers * 4 / 5);
      
      // 5л¶„мқҳ 4 мқҙмғҒ м°¬м„ұ мӢң мһҗлҸҷ мҠ№мқё (statusк°Җ м•„м§Ғ pendingмқј л•Ңл§Ң вҖ” мӨ‘ліө мғқм„ұ л°©м§Җ)
      if(ap.status==='pending' && yesCount >= requiredVotes){
        ap.status='approved';
        ap.passed=true;
        ap.approvedAt=Date.now();
        
        // вҶҗ мһҗлҸҷмңјлЎң Phase 2 (answerEval) мғқм„ұ
        try{
          await createApprovalWithLog({
            type:'answerEval',
            title:'м •лӢө нҸүк°Җ В· '+escapeHtml(ap.answerText.substring(0,30))+'...',
            answerText: ap.answerText,
            relatedSubmissionId: ap.id,
            authorId: null,
            authorName: 'мӢңмҠӨн…ң',
            scores: {},
            body: ap.answerText
          });
        }catch(e){console.error('answerEval creation failed', e);}
      }
      
      ap.updatedAt=Date.now();
      await saveApproval(ap);
      await saveAudit('answer_submit_vote',{approvalId:ap.id,voter:currentUser?currentUser.id:null,vote:vote?'yes':'no',totalVotes:yesCount,required:requiredVotes});
      await refreshAll(true);
    });
  });

  // ==================== Phase 2: нҸүк°Җмһҗ нҸүк°Җ м ңм¶ң (нҷ•м •) вҖ” кё°мЎҙм—җ лҲ„лқҪлҗҳм–ҙ мһҲлҚҳ кё°лҠҘ ====================
  box.querySelectorAll('.ae-submit').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // вҡ  л°©м–ҙм Ғ к¶Ңн•ң/мғҒнғң кІҖмӮ¬
      if(!isJudge()){alert('нҸүк°Җ м ңм¶ң к¶Ңн•ңмқҖ нҸүк°Җмһҗм—җкІҢл§Ң мһҲмҠөлӢҲлӢӨ.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      if(ap.type!=='answerEval')return;
      if(ap.status!=='pending'){alert('мқҙлҜё мў…лЈҢлҗң нҸүк°Җмһ…лӢҲлӢӨ.');return;}
      ap.scores = ap.scores || {};
      if(ap.scores[currentUser.id]){alert('мқҙлҜё нҸүк°ҖлҘј м ңм¶ңн•ҳм…ЁмҠөлӢҲлӢӨ.');return;}

      ap.scores[currentUser.id] = {};
      CATS.forEach(function(cat){
        var scoreEl = document.getElementById('score_'+ap.id+'_'+cat.key);
        var v = scoreEl ? Number(scoreEl.value) : NaN;
        if(isNaN(v)) v = 0;
        if(v<0) v=0; if(v>10) v=10;
        ap.scores[currentUser.id][cat.key] = v;
      });
      try{ clearLocalDraft('approval:scores:'+ap.id); }catch(e){}

      // лӘЁл“  нҸүк°Җмһҗ нҸүк°Җ мҷ„лЈҢ м—¬л¶Җ нҷ•мқё
      var judges = appState.roster.filter(function(r){return r.role==='нҸүк°Җмһҗ';});
      var judgesEvaluated = Object.keys(ap.scores).length;
      var totalJudges = judges.length;

      // лӘЁл“  нҸүк°Җмһҗ нҸүк°Җ мҷ„лЈҢ мӢңм—җл§Ң мөңмў… нҢҗм • (лЈ°: лӘЁл“  н•ӯлӘ© 6м җ мҙҲкіј, нҸүк·  8м җ мҙҲкіј, мң мӮ¬м„ұ 7м җ мқҙмғҒ / мӢңн–үл № м ң4мЎ°мқҳ5в‘¬: нҸүк°Җмһҗ 60% мқҙмғҒ м •лӢө нҢҗм •)
      if(judgesEvaluated === totalJudges && totalJudges > 0){
        var judgesApproved = 0;
        Object.keys(ap.scores).forEach(function(jid){
          var jScores = ap.scores[jid];
          var jAverages = {};
          CATS.forEach(function(cat){ jAverages[cat.key] = jScores[cat.key] || 0; });
          var jAvgAll = Object.keys(jAverages).reduce(function(a,k){return a+jAverages[k];},0)/CATS.length;
          var jAllCatsPassed = true;
          CATS.forEach(function(cat){
            if(cat.key==='sim'){ if(jAverages[cat.key] < 7) jAllCatsPassed=false; }
            else { if(jAverages[cat.key] <= 6) jAllCatsPassed=false; }
          });
          var jPassed = jAllCatsPassed && (jAvgAll > 8);
          if(jPassed) judgesApproved++;
        });

        var consensusPercentage = (judgesApproved / totalJudges * 100).toFixed(2);
        var consensusPassed = judgesApproved >= Math.ceil(totalJudges * 0.6); // 60% мқҙмғҒ

        ap.consensus = {
          approvedCount: judgesApproved,
          totalCount: totalJudges,
          percentage: consensusPercentage,
          passed: consensusPassed,
          finalResult: consensusPassed ? 'correct' : 'incorrect'
        };
        // м „мӣҗ нҸүк°Җ мҷ„лЈҢ мӢңм—җл§Ң мөңмў… мғҒнғң нҷ•м • (н•ң лӘ…л§Ң м ңм¶ңн–ҲлӢӨкі  л°”лЎң мў…лЈҢлҗҳм§Җ м•ҠлҸ„лЎқ н•Ё)
        ap.status = consensusPassed ? 'approved' : 'rejected';
        ap.reviewedBy = currentUser.id;
        ap.reviewedAt = Date.now();
      }

      ap.updatedAt = Date.now();
      await saveApproval(ap);
      await saveAudit('answer_eval_submit',{approvalId:ap.id,judge:currentUser?currentUser.id:null,judgesEvaluated:judgesEvaluated,totalJudges:totalJudges});
      await refreshAll(true);
    });
  });

  // ==================== Phase 2: нҸүк°Җмһҗ м •лӢө нҸүк°Җ м җмҲҳ draft мһҗлҸҷ м ҖмһҘ ====================
  CATS.forEach(function(cat){
    box.querySelectorAll('input.ae-score[id$="_'+cat.key+'"]').forEach(function(scoreInput){
      var scoreId = scoreInput.id; // нҳ•мӢқ: score_[approvalId]_[catKey]
      var parts = scoreId.split('_');
      var apId = parts[1];
      
      // draft ліөмӣҗ
      try{
        var draftScores = loadLocalDraft('approval:scores:'+apId);
        if(draftScores && draftScores[cat.key] !== undefined){
          scoreInput.value = draftScores[cat.key];
        }
      }catch(e){}
      
      // input мӢң draft м ҖмһҘ
      scoreInput.addEventListener('input', function(){
        try{
          var existingDraft = loadLocalDraft('approval:scores:'+apId) || {};
          existingDraft[cat.key] = Number(scoreInput.value) || 0;
          saveLocalDraft('approval:scores:'+apId, existingDraft);
        }catch(e){}
      });
    });
  });

  // ==================== Phase 2: мҳӨлӢө н”јл“ңл°ұ м ңм¶ң ====================
  box.querySelectorAll('.submit-feedback').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var ta=document.getElementById('feedback_'+id);
      var feedback=ta?ta.value.trim():'';
      if(!feedback){alert('н”јл“ңл°ұмқ„ мһ…л Ҙн•ҳм„ёмҡ”.');return;}
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      
      ap.feedbacks = ap.feedbacks || {};
      ap.feedbacks[currentUser.id] = feedback;
      ap.feedbackSubmittedAt = Date.now();
      
      await saveApproval(ap);
      await refreshAll(true);
    });
  });
}

function renderQuestionTab(){
  var box=document.getElementById('tabContent');
  var qs=appState.questions;
  var html='';

  // м°ёк°Җмһҗ: м§Ҳл¬ё м ңм¶ң нҸј
  if(isPlayer()){
    html+='<section><div class="section-label"><span class="no mono">м§Ҳл¬ё</span><span class="name">м§Ҳл¬ё м ңмӢң</span></div>'+
      '<div class="card">'+
        '<p style="font-size:12.5px;color:var(--text-soft);margin:0 0 12px;">н•©мқҳ м Ҳм°ЁлҘј кұ°міҗ кІ°м •лҗң м§Ҳл¬ёмқ„ м ңм¶ңн•ҳм„ёмҡ”. м§Ҳл¬ёмқҖ мӣҗм№ҷм ҒмңјлЎң мҳҲВ·м•„лӢҲмҡ”лЎң лӢөліҖ к°ҖлҠҘн•ң нҳ•нғңм—¬м•ј н•©лӢҲлӢӨ.</p>'+
        '<div class="field"><label for="qText">м§Ҳл¬ё лӮҙмҡ©</label><textarea id="qText" placeholder="мҳҲ: мЈјмқёкіөмқҖ мӮ¬кі лЎң мӮ¬л§қн•ң кұҙк°Җмҡ”?"></textarea></div>'+
        '<button id="submitQuestion" type="button" class="btn btn-primary">м§Ҳл¬ё м ңм¶ң</button>'+
      '</div></section>';
  }

  // м§Ҳл¬ё лӘ©лЎқ
  var pending=qs.filter(function(q){return q.status==='pending';});
  var answered=qs.filter(function(q){return q.status==='answered';});
  var rejected=qs.filter(function(q){return q.status==='rejected';});

  if(pending.length>0){
    html+='<section><div class="section-label"><span class="no mono">лҢҖкё°</span><span class="name">лӢөліҖ лҢҖкё° мӨ‘ ('+pending.length+'кұҙ)</span></div>';
    html+=pending.map(function(q,i){return renderQuestionItem(q,i,qs);}).join('');
    html+='</section>';
  }

  // вҶҗ л°ҳл Өлҗң м§Ҳл¬ё м„№м…ҳ
  if(rejected.length>0){
    html+='<section><div class="section-label"><span class="no mono">л°ҳл Ө</span><span class="name">л°ҳл Өлҗң м§Ҳл¬ё ('+rejected.length+'кұҙ)</span></div>';
    html+=rejected.map(function(q,i){return renderQuestionItem(q,i,qs);}).join('');
    html+='</section>';
  }

  html+='<section><div class="section-label"><span class="no mono">мҷ„лЈҢ</span><span class="name">м§Ҳл¬ё кё°лЎқ ('+answered.length+'кұҙ)</span></div>';
  if(answered.length===0){
    html+='<div class="card empty">м•„м§Ғ лӢөліҖлҗң м§Ҳл¬ёмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
  } else {
    html+=answered.map(function(q,i){return renderQuestionItem(q,i,qs);}).join('');
  }
  html+='</section>';

  box.innerHTML=html;

  // м°ёк°Җмһҗ м§Ҳл¬ё м ңм¶ң
  if(isPlayer()){
    var submitQ=document.getElementById('submitQuestion');
    // restore draft
    try{var dq=loadLocalDraft('composer:question'); if(dq && document.getElementById('qText')) document.getElementById('qText').value = dq.text||'';}catch(e){}
    if(document.getElementById('qText')) document.getElementById('qText').addEventListener('input', function(){ try{ saveLocalDraft('composer:question',{ text: document.getElementById('qText')?document.getElementById('qText').value.trim():'' }); }catch(e){} });
    if(submitQ) submitQ.addEventListener('click',async function(){
      var text=document.getElementById('qText').value.trim();
      if(!text){alert('м§Ҳл¬ёмқ„ мһ…л Ҙн•ҳм„ёмҡ”.');return;}
      // м§Ҳл¬ёмқҖ лЁјм Җ н•©мқҳ(нҲ¬н‘ң) м Ҳм°ЁлҘј нҶөн•ҙ мғҒм •лҗ©лӢҲлӢӨ. м°ёк°Җмһҗ н•©мқҳк°Җ к°ҖкІ°лҗҳл©ҙ мӢӨм ң м§Ҳл¬ё лӘ©лЎқм—җ л“ұлЎқлҗ©лӢҲлӢӨ.
      var qid=genId();
      var proposed={id:qid,no:null,text:text,status:'proposed',askedBy:currentUser.name,askedAt:Date.now()};
      // л°ңмқҳ: м°ёк°Җмһҗ лҢҖмғҒ н•©мқҳ нҲ¬н‘ң мғқм„ұ
      var denom=Math.max(appState.roster.filter(function(r){return r.role==='м°ёк°Җмһҗ';}).length,1);
      var pollTitle='м§Ҳл¬ё н•©мқҳ м ңм•Ҳ: '+(text.length>60?text.slice(0,60)+'...':text);
      await createPollWithLog({type:'consent',preset:'qagree',title:pollTitle,detail:proposed.text,denom:denom,voterRole:'м°ёк°Җмһҗ',proposedQuestion:proposed});
      try{clearLocalDraft('composer:question');}catch(e){}
      document.getElementById('qText').value='';
      await refreshAll(true);
    });
  }

  // м¶ңм ңмһҗ/нҸүк°Җмһҗ: лӢөліҖ мһ‘м„ұ
  attachQuestionEvents(box);
}

function renderQuestionItem(q, idx, allQs){
  var html='<div class="question-item" data-qid="'+escapeHtml(q.id)+'">'+
    '<div class="q-num">Q'+q.no+' В· '+timeAgo(q.askedAt)+' В· '+escapeHtml(q.askedBy||'м°ёк°Җмһҗ')+'</div>'+
    '<div class="q-text">'+escapeHtml(q.text)+'</div>';
  
  // вҶҗ л°ҳл Өлҗң м§Ҳл¬ё н‘ңмӢң
  if(q.status==='rejected'){
    html+='<div class="q-rejected-banner">вӣ” мқҙ м§Ҳл¬ёмқҖ л°ҳл Өлҗҳм—ҲмҠөлӢҲлӢӨ. (л°ҳл Өмһҗ: '+escapeHtml(q.rejectedBy||'?')+' В· '+timeAgo(q.rejectedAt)+')</div>';
  }

  if(q.answer){
    html+='<div class="q-answer"><div class="answer-label">лӢөліҖ</div>'+escapeHtml(q.answer)+'</div>';
  }

  // м¶ңм ңмһҗ: лӢөліҖ мһ‘м„ұ
  if(isQuestioner()&&q.status==='pending'){
    html+='<div style="margin-top:8px;">'+
      '<div class="field"><label>лӢөліҖ мһ‘м„ұ (мҠ№мқё нӣ„ кіөк°ңлҗ©лӢҲлӢӨ)</label>'+
        '<div style="display:flex;gap:8px;margin-bottom:6px;">'+
          '<button class="btn btn-sm btn-secondary q-preset-yes" data-qid="'+escapeHtml(q.id)+'">мҳҲ</button>'+
          '<button class="btn btn-sm btn-secondary q-preset-no" data-qid="'+escapeHtml(q.id)+'">м•„лӢҲмҡ”</button>'+
          '<button class="btn btn-sm btn-secondary q-preset-irr" data-qid="'+escapeHtml(q.id)+'">кҙҖкі„м—ҶмқҢ</button>'+
        '</div>'+
        '<textarea class="q-answer-text" id="q_answer_'+escapeHtml(q.id)+'" placeholder="м„ңмҲ нҳ• лӢөліҖмқҙ н•„мҡ”н•ң кІҪмҡ° м§Ғм ‘ мһ…л Ҙ..." style="min-height:60px;"></textarea>'+
      '</div>'+
      '<button class="btn btn-primary btn-sm q-submit-answer" data-qid="'+escapeHtml(q.id)+'">лӢөліҖ мҠ№мқё мҡ”мІӯ м ңм¶ң</button>'+
    '</div>';
  }

  // нҸүк°Җмһҗ/м¶ңм ңмһҗ: к°„лӢЁ л°ҳл Ө мІҙнҒ¬л°•мҠӨ м¶”к°Җ (л№ лҘё кұ°л¶Җ)
  if((isJudge()||isQuestioner())&&q.status==='pending'){
    html+='<div style="margin-top:8px;display:flex;align-items:center;gap:8px;">'+
      '<input type="checkbox" class="q-reject-chk" data-qid="'+escapeHtml(q.id)+'" id="qreject_'+escapeHtml(q.id)+'"/>'+
      '<label for="qreject_'+escapeHtml(q.id)+'" style="font-size:13px;color:var(--text-soft);margin:0;">м§Ҳл¬ё л°ҳл Ө</label>'+
    '</div>';
  }

  html+='</div>';
  return html;
}

function attachQuestionEvents(box){
  // н”„лҰ¬м…Ӣ лІ„нҠј нҒҙлҰӯ мӢң textarea мұ„мҡ°кё°
  ['yes','no','irr'].forEach(function(preset){
    box.querySelectorAll('.q-preset-'+preset).forEach(function(btn){
      btn.addEventListener('click',function(){
        var item=btn.closest('.question-item');
        var ta=item?item.querySelector('.q-answer-text'):null;
        if(!ta)return;
        if(preset==='yes')ta.value='мҳҲ';
        else if(preset==='no')ta.value='м•„лӢҲмҡ”';
        else ta.value='кҙҖкі„м—ҶмқҢ';
        // вҶҗ draft м ҖмһҘ
        var qid=item?item.getAttribute('data-qid'):null;
        if(qid) try{ saveLocalDraft('q_answer_'+qid, {text:ta.value}); }catch(e){}
      });
    });
  });
  
  // вҶҗ к°Ғ м§Ҳл¬ё лӢөліҖ textareaм—җ input мқҙлІӨнҠё л°”мқёл”© (draft мһҗлҸҷ м ҖмһҘ)
  box.querySelectorAll('.q-answer-text').forEach(function(ta){
    var item=ta.closest('.question-item');
    var qid=item?item.getAttribute('data-qid'):null;
    if(qid){
      // draft ліөмӣҗ
      try{ var dq=loadLocalDraft('q_answer_'+qid); if(dq) ta.value=dq.text||''; }catch(e){}
      // input мӢң draft м ҖмһҘ
      ta.addEventListener('input', function(){
        try{ saveLocalDraft('q_answer_'+qid, {text:ta.value}); }catch(e){}
      });
    }
  });
  
  // лӢөліҖ м ңм¶ң (мҠ№мқё мҡ”мІӯмңјлЎң)
  box.querySelectorAll('.q-submit-answer').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var qid=btn.getAttribute('data-qid');
      var item=btn.closest('.question-item');
      var ta=item?item.querySelector('.q-answer-text'):null;
      var answerText=ta?ta.value.trim():'';
      if(!answerText){alert('лӢөліҖмқ„ мһ…л Ҙн•ҳм„ёмҡ”.');return;}
      var qs2=await fetchQuestions();
      var q=qs2.find(function(x){return x.id===qid;});
      if(!q)return;
      // лӢөліҖмқ„ мҠ№мқё мҡ”мІӯмңјлЎң м ңм¶ң
      await createApprovalWithLog({
        type:'answer',
        title:'м§Ҳл¬ё Q'+q.no+' лӢөліҖ: '+q.text.slice(0,30)+(q.text.length>30?'...':''),
        body:'м§Ҳл¬ё: '+q.text+'\n\nлӢөліҖ: '+answerText,
        authorId:currentUser.id,authorName:currentUser.name,
        relatedQuestionId:qid,proposedAnswer:answerText
      });
      // м§Ҳл¬ёмқ„ мһ„мӢң мһ кёҲ (лӢөліҖ лҢҖкё° мӨ‘)
      q.pendingAnswer=answerText;
      await saveQuestions(qs2);
      await refreshAll(true);
      // мҠ№мқё нғӯмңјлЎң м „нҷҳ
      activeTab='approve';
      renderTabContent();
    });
  });

  // м§Ҳл¬ё л°ҳл Ө мІҙнҒ¬л°•мҠӨ мІҳлҰ¬
  box.querySelectorAll('.q-reject-chk').forEach(function(cb){
    cb.addEventListener('change',async function(){
      var qid=cb.getAttribute('data-qid');
      var qs2=await fetchQuestions();
      var q=qs2.find(function(x){return x.id===qid;});
      if(!q)return;
      if(cb.checked){
        // вҶҗ л°ҳл Ө мІҙнҒ¬ мӢң approvalлЎң мғқм„ұн•ҙм„ң лӢӨлҘё нҸүк°Җмһҗмқҳ мҠ№мқёмқ„ л°ӣкІҢ н•Ё
        await createApprovalWithLog({
          type:'questionReject',
          title:'м§Ҳл¬ё Q'+q.no+' л°ҳл Ө: '+q.text.slice(0,30)+(q.text.length>30?'...':''),
          body:'м§Ҳл¬ё лӮҙмҡ©:\n\n'+q.text+'\n\nмқҙ м§Ҳл¬ёмқҳ л°ҳл ӨлҘј мҠ№мқён•©лӢҲлӢӨ.',
          authorId:currentUser.id,
          authorName:currentUser.name,
          relatedQuestionId:qid
        });
      } else {
        // вҶҗ мІҙнҒ¬ н•ҙм ң мӢң кҙҖл Ёлҗң л°ҳл Ө approval м ңкұ°
        var aps=await fetchApprovals();
        var rejectAp=aps.find(function(a){return a.type==='questionReject' && a.relatedQuestionId===qid && a.status!=='approved';});
        if(rejectAp){
          await deleteApproval(rejectAp.id);
        }
      }
      await refreshAll(true);
    });
  });
}

/* ===== refresh loop ===== */
async function refreshAll(force){
  var savedScrollY = window.scrollY;
  // вҶҗ input к°’ м „м—ӯ м ҖмһҘ (лӘЁл“  нғӯм—җм„ң мһ…л Ҙ ліҙмЎҙ)
  var inputs=document.querySelectorAll('input,textarea,select');
  appState._savedInputs={};
  var focEl=document.activeElement;
  if(focEl && (focEl.tagName==='INPUT'||focEl.tagName==='TEXTAREA'||focEl.tagName==='SELECT')) {
    appState._focusedElementId=focEl.id;
  }
  inputs.forEach(function(el){
    if(el.id) appState._savedInputs[el.id]={
      value: el.type==='checkbox' ? el.checked : el.value,
      selectionStart: el.selectionStart,
      selectionEnd: el.selectionEnd
    };
  });

  var roster=await fetchRoster();
  var polls=await fetchPolls();
  // мһҗлҸҷ л§ҢлЈҢ мІҳлҰ¬: м—ҙлҰ° нҲ¬н‘ң мӨ‘ expiresAtмқҙ м§ҖлӮң кІғмқҖ л§Ҳк°җ
  var expired = polls.filter(function(p){return p.status==='open' && p.expiresAt && p.expiresAt<=Date.now();});
  if(expired.length){
    for(var i=0;i<expired.length;i++){await finalizePoll(expired[i]);}
    // мһ¬мЎ°нҡҢ
    polls=await fetchPolls();
  }
  var approvals=await fetchApprovals();
  var questions=await fetchQuestions();
  var chiefData=await fetchChief();
  var chairsData=await fetchChairs();
  var nominationPending=await fetchNominationPending();
  var designatedQRaw=await storageGet('designatedQuestioner');
  var designatedQuestioner=safeParse(designatedQRaw,null);
  appState.roster=roster;
  appState.polls=polls;
  appState.approvals=approvals.filter(function(a){return!a.isNotice;}); // кіөм§ҖлҠ” лі„лҸ„
  appState.questions=questions;
  appState.chiefId=chiefData?chiefData.id:null;
  appState.chairs=chairsData||{};
  appState.nominationPending=nominationPending||null;
  appState.designatedQuestioner=designatedQuestioner||null;

  var active=polls.find(function(p){return p.status==='open';})||null;
  var votes=active?await fetchVotes(active.id):{};
  var sig=active?(active.id+':'+active.status):'none';
  var sigChanged=sig!==appState.lastSig;
  appState.activePoll=active;
  appState.votes=votes;
  appState.lastSig=sig;

  if(force||sigChanged){
    renderMain();
    window.scrollTo(0, savedScrollY);
  } else {
    // soft refresh: нҳ„мһ¬ нғӯл§Ң лӢӨмӢң к·ёлҰ¬кё°
    renderTabContent();
    window.scrollTo(0, savedScrollY);
  }
}
function startHeartbeat(){
  if(heartbeatTimer)clearInterval(heartbeatTimer);

  heartbeatTimer=setInterval(async function(){

    if(!currentUser)return;

    await storageSet(
      'participant:'+currentUser.id,
      JSON.stringify({
        name:currentUser.name,
        role:currentUser.role,
        joinedAt:currentUser.joinedAt,
        lastSeen:Date.now()
      })
    );

    refreshAll(false);

  },4000);
}

/* ===== boot ===== */
// Realtime DB listener: м „мІҙ DB ліҖкІҪ мӢң мҶҢн”„нҠё лҰ¬н”„л ҲмӢң
try{
  onValue(ref(db),function(snapshot){
    // snapshot may be large; trigger a refresh that reads canonical storage paths
    refreshAll(false).catch(function(){});
  });
}catch(e){console.error('onValue setup failed',e);} 

// м°Ҫ лӢ«мқ„ л•Ң мһҗлҸҷ мІҳлҰ¬ (м„Өм • кё°л°ҳ): лҜём°ём—¬лЎң м „нҷҳ л°Ҹ кІҢмһ„ кё°лЎқ мҙҲкё°нҷ” мӢңлҸ„
// Note: 'unload' may be disallowed by Permissions Policy in some embeds/browsers.
// Use 'pagehide' and 'visibilitychange' (hidden) which are allowed and more reliable.
function handlePageClose(e){
  try{
    if(!currentUser) return;
    var auto = (window.localStorage && window.localStorage.getItem('setting:autoRemoveOnClose')==='true');
    var clearGame = (window.localStorage && window.localStorage.getItem('setting:clearGameOnLeave')==='true');
    if(auto){
      // best-effort synchronous local cleanup
      try{ if(window.localStorage) window.localStorage.removeItem('participant:'+currentUser.id); }catch(err){}
      // best-effort async cleanup (do not await; may not complete during unload)
      try{ storageDelete('participant:'+currentUser.id); }catch(err){}
      try{ remove(ref(db,'participants/'+currentUser.id)); }catch(err){}
      try{ saveAudit('participant_left',{participantId:currentUser.id,name:currentUser.name}); }catch(err){}
    }
    if(clearGame){
      try{ archiveAndClearGameRecords(); }catch(err){}
    }
  }catch(e){console.error('page close handler',e);}  
}

// attach handlers
try{
  window.addEventListener('pagehide', handlePageClose, false);
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') handlePageClose(); });
}catch(e){console.error('attach page close handlers failed',e);} 

renderJoin();
</script>
