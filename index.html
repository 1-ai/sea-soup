function renderQuestionTab(){
  var box=document.getElementById('tabContent');
  if(!box) return;
  var qs=appState.questions;
  var html='';

  // 참가자: 질문 제출 폼
  if(isPlayer()){
    html+='<section><div class="section-label"><span class="no mono">질문</span><span class="name">질문 제시</span></div>'+
      '<div class="card">'+
        '<p style="font-size:12.5px;color:var(--text-soft);margin:0 0 12px;">합의 절차를 거쳐 결정된 질문을 제출하세요. 질문은 원칙적으로 예·아니요로 답변 가능한 형태여야 합니다.</p>'+
        '<div class="field"><label for="qText">질문 내용</label><textarea id="qText" placeholder="예: 주인공은 사고로 사망한 건가요?"></textarea></div>'+
        '<button id="submitQuestion" type="button" class="btn btn-primary">질문 제출</button>'+
      '</div></section>';
  }

  // 질문 목록
  var pending=qs.filter(function(q){return q.status==='pending';});
  var answered=qs.filter(function(q){return q.status==='answered';});
  var rejected=qs.filter(function(q){return q.status==='rejected';});

  if(pending.length>0){
    html+='<section><div class="section-label"><span class="no mono">대기</span><span class="name">답변 대기 중 ('+pending.length+'건)</span></div>';
    html+=pending.map(function(q,i){return renderQuestionItem(q,i,qs);}).join('');
    html+='</section>';
  }

  // ← 반려된 질문 섹션
  if(rejected.length>0){
    html+='<section><div class="section-label"><span class="no mono">반려</span><span class="name">반려된 질문 ('+rejected.length+'건)</span></div>';
    html+=rejected.map(function(q,i){return renderQuestionItem(q,i,qs);}).join('');
    html+='</section>';
  }

  html+='<section><div class="section-label"><span class="no mono">완료</span><span class="name">질문 기록 ('+answered.length+'건)</span></div>';
  if(answered.length===0){
    html+='<div class="card empty">아직 답변된 질문이 없습니다.</div>';
  } else {
    html+=answered.map(function(q,i){return renderQuestionItem(q,i,qs);}).join('');
  }
  html+='</section>';

  box.innerHTML=html;

  // 참가자 질문 제출
  if(isPlayer()){
    var submitQ=document.getElementById('submitQuestion');
    // restore draft
    try{var dq=loadLocalDraft('composer:question'); if(dq && document.getElementById('qText')) document.getElementById('qText').value = dq.text||'';}catch(e){}
    if(document.getElementById('qText')) document.getElementById('qText').addEventListener('input', function(){ try{ saveLocalDraft('composer:question',{ text: document.getElementById('qText')?document.getElementById('qText').value.trim():'' }); }catch(e){} });
    if(submitQ) submitQ.addEventListener('click',async function(){
      var text=document.getElementById('qText').value.trim();
      if(!text){alert('질문을 입력하세요.');return;}
      // 질문은 먼저 합의(투표) 절차를 통해 상정됩니다. 참가자 합의가 가결되면 실제 질문 목록에 등록됩니다.
      var qid=genId();
      var proposed={id:qid,no:null,text:text,status:'proposed',askedBy:currentUser.name,askedAt:Date.now()};
      // 발의: 참가자 대상 합의 투표 생성
      var denom=Math.max(appState.roster.filter(function(r){return r.role==='참가자';}).length,1);
      var pollTitle='질문 합의 제안: '+(text.length>60?text.slice(0,60)+'...':text);
      await createPollWithLog({type:'consent',preset:'qagree',title:pollTitle,detail:proposed.text,denom:denom,voterRole:'참가자',proposedQuestion:proposed});
      try{clearLocalDraft('composer:question');}catch(e){}
      document.getElementById('qText').value='';
      await refreshAll(true);
    });
  }

  // 출제자/평가자: 답변 작성
  attachQuestionEvents(box);
}

function renderQuestionItem(q, idx, allQs){
  var html='<div class="question-item" data-qid="'+escapeHtml(q.id)+'">'+
    '<div class="q-num">Q'+q.no+' · '+timeAgo(q.askedAt)+' · '+escapeHtml(q.askedBy||'참가자')+'</div>'+
    '<div class="q-text">'+escapeHtml(q.text)+'</div>';
  
  // ← 반려된 질문 표시: 참가자에게는 사유 비공개
  if(q.status==='rejected'){
    if(isPlayer()){
      html+='<div class="q-rejected-banner">⛔ 이 질문은 반려되었습니다.</div>';
    } else {
      html+='<div class="q-rejected-banner">⛔ 이 질문은 반려되었습니다. (반려자: '+escapeHtml(q.rejectedBy||'?')+' · '+timeAgo(q.rejectedAt)+')'+(q.rejectReason?'<br/>반려 사유: '+escapeHtml(q.rejectReason):'')+'</div>';
    }
  }

  if(q.answer){
    html+='<div class="q-answer"><div class="answer-label">답변</div>'+escapeHtml(q.answer)+'</div>';
  }

  // 출제자: 답변 작성
  if(isQuestioner()&&q.status==='pending'){
    html+='<div style="margin-top:8px;">'+
      '<div class="field"><label>답변 작성 (승인 후 공개됩니다)</label>'+
        '<div style="display:flex;gap:8px;margin-bottom:6px;">'+
          '<button class="btn btn-sm btn-secondary q-preset-yes" data-qid="'+escapeHtml(q.id)+'">예</button>'+
          '<button class="btn btn-sm btn-secondary q-preset-no" data-qid="'+escapeHtml(q.id)+'">아니요</button>'+
          '<button class="btn btn-sm btn-secondary q-preset-irr" data-qid="'+escapeHtml(q.id)+'">관계없음</button>'+
        '</div>'+
        '<textarea class="q-answer-text" id="q_answer_'+escapeHtml(q.id)+'" placeholder="서술형 답변이 필요한 경우 직접 입력..." style="min-height:60px;"></textarea>'+
      '</div>'+
      '<div class="field"><label style="font-size:12px;">평가자에게 전달할 설명 (선택)</label>'+
        '<textarea class="q-answer-note" id="q_answer_note_'+escapeHtml(q.id)+'" style="min-height:40px;" placeholder="추가 설명이 있으면 입력하세요..."></textarea>'+
      '</div>'+
      '<button class="btn btn-primary btn-sm q-submit-answer" data-qid="'+escapeHtml(q.id)+'">답변 승인 요청 제출</button>'+
    '</div>';
  }

  // 출제자: 질문 반려 버튼 (반려 사유 입력 → 승인 요청)
  if(isQuestioner()&&q.status==='pending'){
    // 이미 반려 승인 요청이 있는 경우 버튼 숨김
    var hasRejectAp=(appState.approvals||[]).some(function(a){return a.type==='questionReject'&&a.relatedQuestionId===q.id&&a.status==='pending';});
    if(!hasRejectAp){
      html+='<div style="margin-top:8px;">'+
        '<div id="qreject_form_'+escapeHtml(q.id)+'" style="display:none;">'+
          '<div class="field" style="margin-bottom:6px;"><label style="font-size:12px;">반려 사유 (필수)</label>'+
            '<textarea class="q-reject-reason" id="qreject_reason_'+escapeHtml(q.id)+'" style="min-height:60px;" placeholder="반려 사유를 입력하세요..."></textarea></div>'+
          '<div class="field" style="margin-bottom:6px;"><label style="font-size:12px;">평가자에게 전달할 설명 (선택)</label>'+
            '<textarea class="q-reject-note" id="qreject_note_'+escapeHtml(q.id)+'" style="min-height:40px;" placeholder="추가 설명이 있으면 입력하세요..."></textarea></div>'+
          '<div class="btn-row">'+
            '<button class="btn btn-sm btn-danger q-reject-submit" data-qid="'+escapeHtml(q.id)+'">반려 승인 요청</button>'+
            '<button class="btn btn-sm btn-ghost q-reject-cancel" data-qid="'+escapeHtml(q.id)+'">취소</button>'+
          '</div>'+
        '</div>'+
        '<button class="btn btn-sm btn-danger q-reject-open" data-qid="'+escapeHtml(q.id)+'" style="margin-top:4px;">질문 반려</button>'+
      '</div>';
    } else {
      html+='<div style="margin-top:8px;font-size:12px;color:var(--gold);">⏳ 반려 승인 요청이 평가자 검토 중입니다.</div>';
    }
  }

  html+='</div>';
  return html;
}

function attachQuestionEvents(box){
  // 프리셋 버튼 클릭 시 textarea 채우기
  ['yes','no','irr'].forEach(function(preset){
    box.querySelectorAll('.q-preset-'+preset).forEach(function(btn){
      btn.addEventListener('click',function(){
        var item=btn.closest('.question-item');
        var ta=item?item.querySelector('.q-answer-text'):null;
        if(!ta)return;
        if(preset==='yes')ta.value='예';
        else if(preset==='no')ta.value='아니요';
        else ta.value='관계없음';
        // ← draft 저장
        var qid=item?item.getAttribute('data-qid'):null;
        if(qid) try{ saveLocalDraft('q_answer_'+qid, {text:ta.value}); }catch(e){}
      });
    });
  });
  
  // ← 각 질문 답변 textarea에 input 이벤트 바인딩 (draft 자동 저장)
  box.querySelectorAll('.q-answer-text').forEach(function(ta){
    var item=ta.closest('.question-item');
    var qid=item?item.getAttribute('data-qid'):null;
    if(qid){
      // draft 복원
      try{ var dq=loadLocalDraft('q_answer_'+qid); if(dq) ta.value=dq.text||''; }catch(e){}
      // input 시 draft 저장
      ta.addEventListener('input', function(){
        try{ saveLocalDraft('q_answer_'+qid, {text:ta.value}); }catch(e){}
      });
    }
  });
  
  // 답변 제출 (승인 요청으로)
  box.querySelectorAll('.q-submit-answer').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var qid=btn.getAttribute('data-qid');
      var item=btn.closest('.question-item');
      var ta=item?item.querySelector('.q-answer-text'):null;
      var noteEl=item?item.querySelector('.q-answer-note'):null;
      var answerText=ta?ta.value.trim():'';
      var authorNote=noteEl?noteEl.value.trim():'';
      if(!answerText){alert('답변을 입력하세요.');return;}
      var qs2=await fetchQuestions();
      var q=qs2.find(function(x){return x.id===qid;});
      if(!q)return;
      // 답변을 승인 요청으로 제출
      await createApprovalWithLog({
        type:'answer',
        title:'질문 Q'+q.no+' 답변: '+q.text.slice(0,30)+(q.text.length>30?'...':''),
        body:'질문: '+q.text+'\n\n답변: '+answerText,
        authorNote:authorNote||null,
        authorId:currentUser.id,authorName:currentUser.name,
        relatedQuestionId:qid,proposedAnswer:answerText
      });
      // 질문을 임시 잠금 (답변 대기 중)
      q.pendingAnswer=answerText;
      await saveQuestions(qs2);
      await refreshAll(true);
      // 승인 탭으로 전환
      activeTab='approve';
      renderTabContent();
    });
  });

  // 질문 반려 버튼: 폼 열기
  box.querySelectorAll('.q-reject-open').forEach(function(btn){
    btn.addEventListener('click',function(){
      var qid=btn.getAttribute('data-qid');
      var form=document.getElementById('qreject_form_'+qid);
      if(form){ form.style.display='block'; btn.style.display='none'; }
    });
  });

  // 질문 반려 버튼: 취소
  box.querySelectorAll('.q-reject-cancel').forEach(function(btn){
    btn.addEventListener('click',function(){
      var qid=btn.getAttribute('data-qid');
      var form=document.getElementById('qreject_form_'+qid);
      var openBtn=box.querySelector('.q-reject-open[data-qid="'+qid+'"]');
      if(form){ form.style.display='none'; }
      if(openBtn){ openBtn.style.display=''; }
    });
  });

  // 질문 반려 버튼: 승인 요청 제출
  box.querySelectorAll('.q-reject-submit').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var qid=btn.getAttribute('data-qid');
      var reasonEl=document.getElementById('qreject_reason_'+qid);
      var noteEl=document.getElementById('qreject_note_'+qid);
      var reason=reasonEl?reasonEl.value.trim():'';
      var note=noteEl?noteEl.value.trim():'';
      if(!reason){alert('반려 사유를 입력하세요.');return;}
      var qs2=await fetchQuestions();
      var q=qs2.find(function(x){return x.id===qid;});
      if(!q)return;
      // 반려를 approval 요청으로 생성 (평가자 승인 필요)
      await createApprovalWithLog({
        type:'questionReject',
        title:'질문 Q'+q.no+' 반려: '+q.text.slice(0,30)+(q.text.length>30?'...':''),
        body:'질문 내용:\n\n'+q.text+'\n\n반려 사유:\n'+reason+(note?'\n\n출제자 설명:\n'+note:''),
        rejectReason:reason,
        authorNote:note||null,
        authorId:currentUser.id,
        authorName:currentUser.name,
        relatedQuestionId:qid
      });
      await refreshAll(true);
      // 승인 탭으로 전환
      activeTab='approve';
      renderTabContent();
    });
  });
}

      });
      // 페이지 로드 시 복원
      try{ var dc=loadLocalDraft('chief:selected'); if(dc && dc.value){ appointSelect.value=dc.value; } }catch(e){}
    }
    
    var appointBtn=document.getElementById('appointBtn');
    if(appointBtn){appointBtn.addEventListener('click',async function(){var sel=document.getElementById('appointSelect');if(!sel||!sel.value)return;await saveChief({id:sel.value,name:sel.options[sel.selectedIndex].text,appointedAt:Date.now()});try{ clearLocalDraft('chief:selected'); }catch(e){} await refreshAll(true);});}
    var clearBtn=document.getElementById('clearChiefBtn');
    if(clearBtn){clearBtn.addEventListener('click',async function(){await saveChief(null);try{ clearLocalDraft('chief:selected'); }catch(e){} await refreshAll(true);});}
    var forcedBtn=document.getElementById('forcedAgreeBtn');
    if(forcedBtn){forcedBtn.addEventListener('click',async function(){
      // 출제자 발의: 참가자 투표 / 평가장 발의: 전체 투표
      var voterRole=isQuestioner()?'참가자':'전체';
      var N=Math.max(appState.roster.filter(function(r){return voterRole==='전체'||r.role===voterRole;}).length,1);
      var title=isQuestioner()?'[강제 합의] 출제자 발의':'[강제 합의] 평가장 발의';
      await createPollWithLog({type:'consent',preset:'forced',title:title,detail:'강제 합의(과반수 반대 없음 기준) 발의',denom:N,voterRole:voterRole,override:{forced:true},createdByQuestioner:isQuestioner()});
      await refreshAll(true);
    });}
    var nominateSelect=document.getElementById('nominateSelect');
    if(nominateSelect){
      nominateSelect.addEventListener('change',function(){
        try{ saveLocalDraft('nominee:selected', {value:nominateSelect.value}); }catch(e){}
      });
      // 페이지 로드 시 복원
      try{ var dn=loadLocalDraft('nominee:selected'); if(dn && dn.value){ nominateSelect.value=dn.value; } }catch(e){}
    }
    var nominateBtn=document.getElementById('nominateBtn');
    if(nominateBtn){nominateBtn.addEventListener('click',async function(){var sel=document.getElementById('nominateSelect');if(!sel||!sel.value)return;var obj={id:sel.value,name:sel.options[sel.selectedIndex].text,designatedBy:currentUser?currentUser.id:null,at:Date.now()};await saveDesignatedQuestioner(obj);await clearNominationPending();await saveAudit('questioner_designated',obj);try{ clearLocalDraft('nominee:selected'); }catch(e){} await refreshAll(true);});}
  }
}

/* ===== refresh loop ===== */
async function refreshAll(force){
  var savedScrollY = window.scrollY;
  // ← input 값 전역 저장 (모든 탭에서 입력 보존)
  var inputs=document.querySelectorAll('input,textarea,select');
  appState._savedInputs={};
  var focEl=document.activeElement;
  if(focEl && (focEl.tagName==='INPUT'||focEl.tagName==='TEXTAREA'||focEl.tagName==='SELECT')) {
    appState._focusedElementId=focEl.id;
  }
  inputs.forEach(function(el){
    if(el.id) appState._savedInputs[el.id]={
      value: el.type==='checkbox' ? el.checked : el.value,
      selectionStart: el.selectionStart,
      selectionEnd: el.selectionEnd
    };
  });

  var roster=await fetchRoster();
  var polls=await fetchPolls();
  // 자동 만료 처리: 열린 투표 중 expiresAt이 지난 것은 마감
  var expired = polls.filter(function(p){return p.status==='open' && p.expiresAt && p.expiresAt<=Date.now();});
  if(expired.length){
    for(var i=0;i<expired.length;i++){await finalizePoll(expired[i]);}
    // 재조회
    polls=await fetchPolls();
  }
  var approvals=await fetchApprovals();
  var questions=await fetchQuestions();
  var chiefData=await fetchChief();
  var chairsData=await fetchChairs();
  var nominationPending=await fetchNominationPending();
  var designatedQRaw=await storageGet('designatedQuestioner');
  var designatedQuestioner=safeParse(designatedQRaw,null);
  appState.roster=roster;
  appState.polls=polls;
  appState.approvals=approvals.filter(function(a){return!a.isNotice;}); // 공지는 별도
  appState.questions=questions;
  appState.chiefId=chiefData?chiefData.id:null;
  appState.chairs=chairsData||{};
  appState.nominationPending=nominationPending||null;
  appState.designatedQuestioner=designatedQuestioner||null;

  var active=polls.find(function(p){return p.status==='open';})||null;
  var votes=active?await fetchVotes(active.id):{};
  var sig=active?(active.id+':'+active.status):'none';
  var sigChanged=sig!==appState.lastSig;
  appState.activePoll=active;
  appState.votes=votes;
  appState.lastSig=sig;

  if(force||sigChanged){
    if(!force && appState._suspendRender){
      // 사용자가 입력 중이면 지금 다시 그리지 않고, 포커스가 빠질 때 적용
      appState._pendingRenderFn=renderMain;
    } else {
      renderMain();
      window.scrollTo(0, savedScrollY);
    }
  } else {
    // soft refresh: 현재 탭만 다시 그리기
    if(appState._suspendRender){
      appState._pendingRenderFn=renderTabContent;
    } else {
      renderTabContent();
      window.scrollTo(0, savedScrollY);
    }
  }
}
function startHeartbeat(){
  if(heartbeatTimer)clearInterval(heartbeatTimer);

  heartbeatTimer=setInterval(async function(){

    if(!currentUser)return;

    await storageSet(
      'participant:'+currentUser.id,
      JSON.stringify({
        name:currentUser.name,
        role:currentUser.role,
        joinedAt:currentUser.joinedAt,
        lastSeen:Date.now()
      })
    );

    refreshAll(false);

  },4000);
}

/* ===== 카운트다운 전용 1초 틱 =====
   하트비트(4초)나 실시간 DB 갱신 주기와 무관하게, 화면에 떠 있는
   ⏱ 남은시간 표시만 매초 정확히 갱신한다. DOM을 새로 그리지 않고
   텍스트만 바꾸므로 입력 중인 다른 요소에도 영향이 없다. */
function tickCountdown(){
  var el=document.getElementById('pollCountdown');
  if(!el) return;
  var poll=appState.activePoll;
  if(!poll||!poll.expiresAt||poll.status!=='open') return;
  var rem=Math.max(0,Math.floor((poll.expiresAt-Date.now())/1000));
  var m=Math.floor(rem/60);var s=rem%60;
  el.textContent='⏱ '+(m>0?m+'분 ':'')+s+'초 남음';
}
function startCountdownTicker(){
  if(countdownTimer)clearInterval(countdownTimer);
  countdownTimer=setInterval(tickCountdown,1000);
}


/* ===== boot ===== */
// Realtime DB listener: 전체 DB 변경 시 소프트 리프레시
// onValue는 DB 어딘가가 바뀔 때마다(다른 참가자의 하트비트 포함) 매우 자주 호출될 수 있으므로,
// 짧은 시간 안에 여러 번 들어오면 한 번만 처리하도록 모아준다(디바운스).
var dbRefreshDebounceTimer=null;
function scheduleSoftRefresh(){
  if(dbRefreshDebounceTimer) return;
  dbRefreshDebounceTimer=setTimeout(function(){
    dbRefreshDebounceTimer=null;
    refreshAll(false).catch(function(){});
  },500);
}
try{
  onValue(ref(db),function(snapshot){
    // snapshot may be large; trigger a refresh that reads canonical storage paths
    scheduleSoftRefresh();
  });
}catch(e){console.error('onValue setup failed',e);} 

// 창 닫을 때 자동 처리 (설정 기반): 미참여로 전환 및 게임 기록 초기화 시도
// Note: 'unload' may be disallowed by Permissions Policy in some embeds/browsers.
// Use 'pagehide' and 'visibilitychange' (hidden) which are allowed and more reliable.
function handlePageClose(e){
  try{
    if(!currentUser) return;
    var auto = (window.localStorage && window.localStorage.getItem('setting:autoRemoveOnClose')==='true');
    var clearGame = (window.localStorage && window.localStorage.getItem('setting:clearGameOnLeave')==='true');
    if(auto){
      // best-effort synchronous local cleanup
      try{ if(window.localStorage) window.localStorage.removeItem('participant:'+currentUser.id); }catch(err){}
      // best-effort async cleanup (do not await; may not complete during unload)
      try{ storageDelete('participant:'+currentUser.id); }catch(err){}
      try{ remove(ref(db,'participants/'+currentUser.id)); }catch(err){}
      try{ saveAudit('participant_left',{participantId:currentUser.id,name:currentUser.name}); }catch(err){}
    }
    if(clearGame){
      try{ archiveAndClearGameRecords(); }catch(err){}
    }
  }catch(e){console.error('page close handler',e);}  
}

// attach handlers
try{
  window.addEventListener('pagehide', handlePageClose, false);
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') handlePageClose(); });
}catch(e){console.error('attach page close handlers failed',e);} 

renderJoin();
startCountdownTicker();
</script>
