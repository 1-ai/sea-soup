<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>바다거북스프 평결부</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --ink-bg:#16222d;
  --ink-bg-2:#1d2e3b;
  --paper:#ece2c8;
  --paper-2:#e0d4ae;
  --gold:#b8923f;
  --stamp-red:#a23a2c;
  --teal:#2e6c5e;
  --amber:#b87c2e;
  --violet:#4a3a7a;
  --text-ink:#241c12;
  --text-onink:#e8dfc6;
  --text-soft:#6b5e47;
  --text-soft-onink:#93a4b0;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(circle at 12% 0%, rgba(184,146,63,0.08), transparent 45%), var(--ink-bg);
  color:var(--text-onink);
  font-family:'Noto Sans KR', sans-serif;
  min-height:100vh;
  -webkit-tap-highlight-color: transparent;
}
.mono{font-family:'IBM Plex Mono', monospace;}
.serif{font-family:'Nanum Myeongjo', serif;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ---- layout ---- */
.wrap{max-width:560px;margin:0 auto;padding:0 16px 80px;}
.hdr{max-width:560px;margin:0 auto;padding:22px 16px 16px;border-bottom:1px solid rgba(184,146,63,0.35);}
.hdr-top{display:flex;align-items:center;gap:12px;}
.brandmark svg{width:46px;height:46px;display:block;}
.hdr-title h1{font-family:'Nanum Myeongjo', serif;font-size:21px;font-weight:800;margin:0;letter-spacing:0.5px;color:var(--text-onink);}
.hdr-title .sub{font-size:11.5px;color:var(--text-soft-onink);margin-top:2px;letter-spacing:0.3px;}
.user-badge{margin-top:14px;display:flex;align-items:center;justify-content:space-between;background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.3);border-radius:999px;padding:8px 8px 8px 14px;}
.user-badge .who{font-size:13.5px;}
.user-badge .role-tag{font-size:11px;padding:3px 9px;border-radius:999px;margin-left:8px;font-family:'IBM Plex Mono', monospace;letter-spacing:0.3px;}
.role-tag.judge{background:rgba(46,108,94,0.25);color:#9fd8c6;border:1px solid rgba(46,108,94,0.5);}
.role-tag.player{background:rgba(162,58,44,0.22);color:#e7b4a7;border:1px solid rgba(162,58,44,0.45);}
.role-tag.questioner{background:rgba(74,58,122,0.3);color:#c4b8e8;border:1px solid rgba(74,58,122,0.5);}
.user-badge button{background:transparent;border:none;color:var(--text-soft-onink);font-size:11.5px;text-decoration:underline;padding:6px 8px;}

/* ---- nav tabs (기능 전환) ---- */
.main-nav{display:flex;gap:6px;padding:14px 16px 0;max-width:560px;margin:0 auto;overflow-x:auto;}
.main-nav::-webkit-scrollbar{height:0;}
.nav-btn{flex:0 0 auto;padding:8px 14px;border-radius:999px;border:1.5px solid rgba(184,146,63,0.35);background:transparent;color:var(--text-soft-onink);font-size:12.5px;font-weight:600;white-space:nowrap;}
.nav-btn.active{background:var(--gold);color:var(--ink-bg);border-color:var(--gold);}
.nav-badge{display:inline-block;background:var(--stamp-red);color:#fff;border-radius:999px;font-size:10px;padding:1px 5px;margin-left:4px;font-family:'IBM Plex Mono', monospace;}

section{margin-top:22px;}
.section-label{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.section-label .no{font-family:'IBM Plex Mono', monospace;color:var(--gold);font-size:12px;}
.section-label .name{font-family:'Nanum Myeongjo', serif;font-size:15.5px;font-weight:700;color:var(--text-onink);}

/* ---- cards ---- */
.card{background:var(--paper);color:var(--text-ink);border-radius:var(--radius);padding:18px;box-shadow:0 10px 24px -12px rgba(0,0,0,0.55);position:relative;}
.card+.card{margin-top:12px;}
.card.empty{text-align:center;font-size:13.5px;border:1px dashed rgba(107,94,71,0.4);background:transparent;color:var(--text-soft-onink);}
.card.dark{background:var(--ink-bg-2);color:var(--text-onink);border:1px solid rgba(184,146,63,0.25);}

/* ---- status pill ---- */
.poll-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.poll-head .tag{font-family:'IBM Plex Mono', monospace;font-size:10.5px;color:var(--text-soft);letter-spacing:0.4px;}
.poll-head h3{font-family:'Nanum Myeongjo', serif;font-size:17px;margin:4px 0 2px;line-height:1.3;}
.poll-meta{font-size:11.5px;color:var(--text-soft);margin-bottom:14px;}
.status-pill{font-size:10.5px;padding:3px 8px;border-radius:999px;white-space:nowrap;font-family:'IBM Plex Mono', monospace;}
.status-pill.open{background:rgba(46,108,94,0.18);color:var(--teal);border:1px solid rgba(46,108,94,0.4);}
.status-pill.closed{background:rgba(162,58,44,0.14);color:var(--stamp-red);border:1px solid rgba(162,58,44,0.35);}
.status-pill.pending{background:rgba(184,146,63,0.18);color:var(--gold);border:1px solid rgba(184,146,63,0.4);}
.status-pill.approved{background:rgba(46,108,94,0.18);color:var(--teal);border:1px solid rgba(46,108,94,0.4);}
.status-pill.rejected{background:rgba(162,58,44,0.14);color:var(--stamp-red);border:1px solid rgba(162,58,44,0.35);}
.status-pill.objected{background:rgba(74,58,122,0.25);color:#c4b8e8;border:1px solid rgba(74,58,122,0.45);}

.hairline{border-top:1px solid rgba(107,94,71,0.25);margin:14px 0;}

/* ---- score input ---- */
.score-row{display:grid;grid-template-columns:64px 1fr 32px;align-items:center;gap:10px;margin-bottom:10px;}
.score-row label{font-size:13px;font-weight:600;}
.score-row input[type=range]{width:100%;accent-color:var(--stamp-red);}
.score-row output{font-family:'IBM Plex Mono', monospace;font-size:13px;text-align:right;}
.btn{border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:700;width:100%;margin-top:6px;}
.btn-primary{background:var(--text-ink);color:var(--paper);}
.btn-secondary{background:transparent;color:var(--text-ink);border:1.5px solid rgba(36,28,18,0.4);}
.btn-ghost{background:transparent;color:var(--text-soft-onink);border:1px dashed rgba(147,164,176,0.5);}
.btn-danger{background:transparent;color:var(--stamp-red);border:1.5px solid rgba(162,58,44,0.45);}
.btn-approve{background:var(--teal);color:#fff;border:none;}
.btn-reject{background:var(--stamp-red);color:#fff;border:none;}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{margin-top:0;}

.consent-buttons{display:flex;gap:10px;}
.btn-yes,.btn-no{flex:1;padding:14px 8px;border-radius:10px;font-size:14.5px;font-weight:700;border:1.5px solid transparent;background:rgba(0,0,0,0.04);color:var(--text-ink);}
.btn-yes.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn-no.active{background:var(--stamp-red);color:#fff;border-color:var(--stamp-red);}

.tally-line{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;color:var(--text-soft);}
.bar-track{height:8px;border-radius:99px;background:rgba(107,94,71,0.18);overflow:hidden;margin-bottom:14px;}
.bar-fill{height:100%;border-radius:99px;}
.bar-fill.teal{background:var(--teal);}
.bar-fill.red{background:var(--stamp-red);}

.evaltable{width:100%;font-size:12px;border-collapse:collapse;margin-top:8px;}
.evaltable th,.evaltable td{padding:4px 5px;text-align:center;border-bottom:1px solid rgba(107,94,71,0.18);}
.evaltable th{color:var(--text-soft);font-weight:600;font-size:10.5px;}
.evaltable td.name{text-align:left;font-weight:600;}
.pass-yes{color:var(--teal);font-weight:700;}
.pass-no{color:var(--stamp-red);font-weight:700;}

details.raw{margin-top:10px;font-size:12.5px;}
details.raw summary{cursor:pointer;color:var(--text-soft);font-size:12px;}

/* ---- seal ---- */
.seal-wrap{display:flex;flex-direction:column;align-items:center;margin:6px 0 4px;}
.seal{width:148px;height:148px;transform:rotate(-4deg);animation:stampDown .55s ease-out;}
@keyframes stampDown{0%{transform:scale(1.55) rotate(-12deg);opacity:0;}60%{transform:scale(0.94) rotate(2deg);opacity:1;}100%{transform:scale(1) rotate(-4deg);opacity:1;}}
@media (prefers-reduced-motion: reduce){.seal{animation:none;}}
.seal-ring-outer{fill:none;stroke-width:3;}
.seal-ring-inner{fill:none;stroke-width:1.4;}
.seal.tone-pass .seal-ring-outer,.seal.tone-pass .seal-ring-inner,.seal.tone-pass .seal-main-text,.seal.tone-pass .seal-arctext,.seal.tone-pass .seal-turtle{stroke:var(--teal);fill:var(--teal);}
.seal.tone-fail .seal-ring-outer,.seal.tone-fail .seal-ring-inner,.seal.tone-fail .seal-main-text,.seal.tone-fail .seal-arctext,.seal.tone-fail .seal-turtle{stroke:var(--stamp-red);fill:var(--stamp-red);}
.seal.tone-neutral .seal-ring-outer,.seal.tone-neutral .seal-ring-inner,.seal.tone-neutral .seal-main-text,.seal.tone-neutral .seal-arctext,.seal.tone-neutral .seal-turtle{stroke:var(--gold);fill:var(--gold);}
.seal-turtle ellipse,.seal-turtle path,.seal-turtle circle{fill:inherit;}
.seal-arctext{font-family:'IBM Plex Mono', monospace;font-size:9px;letter-spacing:1px;}
.seal-main-text{font-family:'Nanum Myeongjo', serif;font-size:18px;font-weight:800;text-anchor:middle;}
.seal-sub-text{font-family:'IBM Plex Mono', monospace;font-size:8.5px;text-anchor:middle;}

/* ---- composer ---- */
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;}
.tabs::-webkit-scrollbar{height:0;}
.tab-btn{flex:0 0 auto;padding:9px 12px;border-radius:9px;border:1.5px solid rgba(36,28,18,0.25);background:transparent;color:var(--text-ink);font-size:13px;font-weight:700;}
.tab-btn.active{background:var(--text-ink);color:var(--paper);border-color:var(--text-ink);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px;color:var(--text-ink);}
.field .hint{font-size:11px;color:var(--text-soft);margin-top:4px;}
.field input[type=text],.field input[type=number],.field select,.field textarea{width:100%;padding:10px 11px;border-radius:9px;border:1.5px solid rgba(36,28,18,0.25);background:var(--paper-2);color:var(--text-ink);font-size:13.5px;}
.field textarea{resize:vertical;min-height:80px;line-height:1.5;}
.checkrow{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-top:6px;}

/* ---- history ---- */
.hist-item{background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.25);border-radius:11px;padding:12px 14px;margin-bottom:9px;}
.hist-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.hist-top .title{font-size:13.5px;font-weight:600;color:var(--text-onink);}
.hist-stamp{font-family:'IBM Plex Mono', monospace;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700;}
.hist-stamp.pass{background:rgba(46,108,94,0.22);color:#9fd8c6;}
.hist-stamp.fail{background:rgba(162,58,44,0.2);color:#e7b4a7;}
.hist-stamp.neutral{background:rgba(184,146,63,0.2);color:#e8c87a;}
.hist-sub{font-size:11px;color:var(--text-soft-onink);margin-top:5px;font-family:'IBM Plex Mono', monospace;}

/* ---- roster ---- */
.chip-group{margin-bottom:10px;}
.chip-group .cap{font-size:11px;color:var(--text-soft-onink);margin-bottom:6px;font-family:'IBM Plex Mono', monospace;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:12px;padding:5px 11px;border-radius:999px;background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.3);color:var(--text-onink);}
.chip.chief{border-color:var(--gold);color:var(--gold);}

/* ---- approval items ---- */
.approval-item{background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.25);border-radius:12px;padding:14px;margin-bottom:10px;}
.approval-item .a-type{font-family:'IBM Plex Mono', monospace;font-size:10.5px;color:var(--text-soft-onink);margin-bottom:4px;}
.approval-item .a-title{font-size:14px;font-weight:700;color:var(--text-onink);margin-bottom:6px;line-height:1.4;}
.approval-item .a-body{font-size:12.5px;color:var(--text-soft-onink);margin-bottom:10px;line-height:1.5;white-space:pre-wrap;background:rgba(0,0,0,0.2);border-radius:8px;padding:10px;}
.approval-item .a-meta{font-size:11px;color:var(--text-soft-onink);margin-bottom:10px;}
.a-reason{font-size:12.5px;color:var(--text-soft-onink);background:rgba(162,58,44,0.15);border:1px solid rgba(162,58,44,0.3);border-radius:8px;padding:10px;margin-bottom:10px;line-height:1.5;}
.a-reason.violet{background:rgba(74,58,122,0.2);border-color:rgba(74,58,122,0.35);color:#c4b8e8;}
.a-reason.green{background:rgba(46,108,94,0.2);border-color:rgba(46,108,94,0.35);color:#7dd9c8;}
.a-objection{font-size:12.5px;background:rgba(74,58,122,0.15);border:1px solid rgba(74,58,122,0.35);border-radius:8px;padding:10px;margin-bottom:10px;line-height:1.5;color:#c4b8e8;}
.notify-banner{background:rgba(184,146,63,0.15);border:1px solid rgba(184,146,63,0.35);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:12.5px;color:var(--gold);line-height:1.5;}

/* ---- question items ---- */
.question-item{background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.2);border-radius:11px;padding:12px 14px;margin-bottom:8px;}
.q-num{font-family:'IBM Plex Mono', monospace;font-size:10.5px;color:var(--gold);margin-bottom:3px;}
.q-text{font-size:13.5px;color:var(--text-onink);font-weight:600;margin-bottom:5px;}
.q-answer{font-size:12.5px;color:var(--text-soft-onink);background:rgba(0,0,0,0.25);border-radius:7px;padding:8px 10px;margin-top:6px;}
.q-answer .answer-label{font-family:'IBM Plex Mono', monospace;font-size:10px;color:var(--teal);margin-bottom:3px;}
.q-rejected-banner{font-size:12.5px;background:rgba(162,58,44,0.2);border:1.5px solid rgba(162,58,44,0.4);border-radius:8px;padding:10px 12px;margin-top:8px;color:#ff9999;line-height:1.5;}

/* ---- chief badge ---- */
.chief-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(184,146,63,0.15);border:1px solid rgba(184,146,63,0.4);border-radius:999px;padding:4px 10px;font-size:11px;color:var(--gold);font-family:'IBM Plex Mono', monospace;}

/* ---- join screen ---- */
.join-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.join-card{max-width:380px;width:100%;background:var(--paper);color:var(--text-ink);border-radius:18px;padding:30px 26px 26px;box-shadow:0 20px 50px -20px rgba(0,0,0,0.6);text-align:center;}
.join-card .brandmark{margin:0 auto 14px;width:64px;}
.join-card .brandmark svg{width:64px;height:64px;}
.join-card h1{font-family:'Nanum Myeongjo', serif;font-size:21px;margin:0 0 6px;}
.join-card .tagline{font-size:12.5px;color:var(--text-soft);margin:0 0 22px;line-height:1.5;}
.join-card form{text-align:left;}
.join-card label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px;}
.join-card input[type=text]{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid rgba(36,28,18,0.3);background:var(--paper-2);font-size:14px;margin-bottom:16px;}
fieldset.role-pick{border:none;padding:0;margin:0 0 18px;}
fieldset.role-pick legend{font-size:12.5px;font-weight:700;margin-bottom:8px;padding:0;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.role-opt{display:flex;align-items:center;gap:6px;border:1.5px solid rgba(36,28,18,0.25);border-radius:9px;padding:9px 10px;font-size:13px;cursor:pointer;}
.role-opt input{accent-color:var(--text-ink);}
.share-hint{margin-top:18px;font-size:11px;color:var(--text-soft);border-top:1px dashed rgba(107,94,71,0.35);padding-top:14px;line-height:1.5;}

footer.legal-footnote{max-width:560px;margin:36px auto 0;padding:0 16px 28px;font-size:10.5px;color:var(--text-soft-onink);line-height:1.6;text-align:center;}

/* ---- archive manager modal ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--ink-bg-2);border:1px solid rgba(184,146,63,0.4);border-radius:16px;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid rgba(184,146,63,0.2);}
.modal-head h2{font-family:'Nanum Myeongjo',serif;font-size:17px;margin:0;color:var(--text-onink);}
.modal-close{background:transparent;border:none;color:var(--text-soft-onink);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;}
.modal-body{overflow-y:auto;padding:16px 18px;flex:1;}
.archive-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.2);border:1px solid rgba(184,146,63,0.18);border-radius:10px;padding:10px 14px;margin-bottom:8px;gap:10px;}
.archive-row .arc-info{flex:1;min-width:0;}
.archive-row .arc-key{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);word-break:break-all;}
.archive-row .arc-date{font-size:11.5px;color:var(--text-soft-onink);margin-top:3px;}
.archive-row .arc-btns{display:flex;gap:6px;flex-shrink:0;}
.admin-auth-box{background:rgba(0,0,0,0.25);border:1px solid rgba(184,146,63,0.25);border-radius:10px;padding:14px;margin-bottom:14px;}
.admin-auth-box p{font-size:12.5px;color:var(--text-soft-onink);margin:0 0 10px;}
.admin-auth-box input{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid rgba(184,146,63,0.3);background:var(--ink-bg);color:var(--text-onink);font-size:13px;margin-bottom:8px;}
</style>

async function storageGet(key){try{const r=await window.storage.get(key,true);return r?r.value:null;}catch(e){return null;}}

// storage polyfill using localStorage when `window.storage` is not provided
if(typeof window.storage==='undefined'){
  window.storage = {
    get: async function(key){
      try{
        const snapshot = await get(ref(db, key));
        if(snapshot && snapshot.exists()) return { value: snapshot.val() };
        return null;
      }catch(e){ console.error(e); return null; }
    },
    set: async function(key, value){
      try{
        await set(ref(db, key), typeof value === 'string' ? value : JSON.stringify(value));
        return { ok: true };
      }catch(e){ console.error(e); return { ok: false }; }
    },
    delete: async function(key){
      try{ await remove(ref(db, key)); return { ok: true }; }catch(e){ console.error(e); return { ok: false }; }
    },
    list: async function(prefix){
      try{
        const snapshot = await get(ref(db));
        if(!snapshot || !snapshot.exists()) return { keys: [] };
        const data = snapshot.val();
        const keys = Object.keys(data||{});
        return { keys: keys.filter(function(k){ return !prefix || k.indexOf(prefix) === 0; }) };
      }catch(e){ console.error(e); return { keys: [] }; }
    }
  };
}

/* ===== 입력 중 렌더링 보류 (모바일 키보드 깜빡임 방지) =====
   input/textarea/select에 포커스가 있는 동안에는 실시간 갱신이 와도

   렌더링을 한 번에 적용한다. 이렇게 하면 실시간성은 유지되면서
   타이핑 중 DOM이 재생성되어 모바일 키보드가 닫혔다 열리는 현상을 막는다. */
function isEditableEl(el){
  return !!el && (el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT');
}
document.addEventListener('focusin',function(e){
  if(isEditableEl(e.target)) appState._suspendRender=true;
});
document.addEventListener('focusout',function(e){
  if(!isEditableEl(e.target)) return;
  // 포커스가 다른 입력 요소로 곧바로 이동하는 경우(탭 전환 등) 깜빡임 없이 넘어가도록 약간 지연 후 확인
  setTimeout(function(){
    if(isEditableEl(document.activeElement)) return; // 여전히 다른 입력칸에 포커스 중
    appState._suspendRender=false;
    if(appState._pendingRenderFn){
      var fn=appState._pendingRenderFn;
      appState._pendingRenderFn=null;
      fn();
    }
  },150);
});

/* ===== scoring logic ===== */
function computeScoreResult(votes,denom){var ids=Object.keys(votes);var breakdown=ids.map(function(id){var v=votes[id];var vals=[v.ctx,v.ctxt,v.rat,v.sim,v.det];var allAbove6=vals.every(function(x){return x>6;});var avg=vals.reduce(function(a,b){return a+b;},0)/5;var avgAbove8=avg>8;var simOk=v.sim>=7;var pass=allAbove6&&avgAbove8&&simOk;return{id:id,vals:vals,avg:avg,pass:pass};});var passCount=breakdown.filter(function(b){return b.pass;}).length;var total=denom&&denom>0?denom:ids.length;var rate=total?(passCount/total*100):0;var finalPass=rate>=60;var catAvg=CATS.map(function(c,i){if(breakdown.length===0)return 0;var sum=breakdown.reduce(function(s,b){return s+b.vals[i];},0);return sum/breakdown.length;});return{breakdown:breakdown,passCount:passCount,total:total,submitted:ids.length,rate:rate,finalPass:finalPass,catAvg:catAvg};}
function computeConsentResult(votes,denom,preset,override){
  var ids=Object.keys(votes);
  var yes=ids.filter(function(id){return votes[id]==='찬성';}).length;
  var no=ids.length-yes;
  var N=(denom&&denom>0)?denom:Math.max(ids.length,1);
  var required,label,pass;
  // forced override: 통과 조건이 '과반수 반대 없음'인 경우
  if(override&&override.forced){
    // 과반수 초과의 반대가 있으면 부결
    pass = (no <= Math.floor(N/2));
    label = '강제 합의 (과반수 반대 없음 기준)';
    required = '반대가 과반수 초과 여부 확인';
    return{yes:yes,no:no,submitted:ids.length,N:N,required:required,label:label,pass:pass};
  }
  if(preset==='objection'){
    if(N<=1){required=1;label='해당 평가자 1인의 단독 결정';pass=yes>=1;}else{required=Math.floor(N/2)+1;label='재적 과반수 ('+required+'/'+N+')';pass=yes>=required;}
  } else if(preset==='subrule'||preset==='chiefvote'){
    if(override==='twothirds'){required=Math.ceil(N*2/3);label='재적 3분의 2 이상 ('+required+'/'+N+')';pass=yes>=required;}else{required=N;label='재적 전원 찬성 ('+required+'/'+N+')';pass=yes>=required&&N>0;}
  } else if(preset==='submission'||preset==='qagree'){
    if(N<=1){required=1;label='단독 찬성으로 충족';pass=yes>=1;}else{required=Math.max(1,Math.ceil(N*4/5));label='5분의 4 이상 ('+required+'/'+N+')';pass=yes>=required;}
  } else {
    var pct=(override&&override.percent)?Number(override.percent):50;required=Math.max(1,Math.ceil(N*pct/100));label='찬성 '+pct+'% 이상 ('+required+'/'+N+')';pass=yes>=required;
  }
  return{yes:yes,no:no,submitted:ids.length,N:N,required:required,label:label,pass:pass};
}

/* ===== role / eligibility ===== */
function isJudge(){return currentUser&&currentUser.role==='평가자';}
function isQuestioner(){return currentUser&&currentUser.role==='출제자';}
function isPlayer(){return currentUser&&currentUser.role==='참가자';}
function canVoteOn(poll){if(!currentUser)return false;if(poll.type==='score')return isJudge();return poll.voterRole==='전체'||poll.voterRole===currentUser.role;}
// 찬반 수(집계)는 모두에게 공개하되, 반대자 "이름"은 출제자에게만 공개하는 투표 유형
// (평가장 선임=chiefvote, 전담 평가원 선임/재선임=chair:*)
function isDisagreeRevealPreset(preset){return preset==='chiefvote'||(typeof preset==='string'&&preset.indexOf('chair:')===0);}
function canCreateScorePoll(){return isJudge();}
function canClosePoll(){
  var poll=appState.activePoll;
  if(!poll) return false;
  // 질문 합의(qagree), 정답 제출 합의(submission) 투표는 출제자가 마감
  if(poll.preset==='qagree'||poll.preset==='submission'||poll.preset==='chiefvote') return isQuestioner();
  // 강제 합의: 출제자가 발의한 경우 출제자가 마감, 평가장이 발의한 경우 평가자(평가장)가 마감
  if(poll.preset==='forced') return poll.createdByQuestioner?isQuestioner():isJudge();
  // 나머지(점수 평가, 찬반 등)는 평가자가 마감
  return isJudge();
}
function isChief(){return currentUser&&appState.chiefId&&appState.chiefId===currentUser.id;}

function pendingApprovalCount(){return appState.approvals.filter(function(a){return a.status==='pending';}).length;}
function pendingQuestionCount(){return appState.questions.filter(function(q){return q.status==='pending';}).length;}

function renderTally(){

  if(poll.type==='score'){

      } else {

      }
    } else {
      var sealHtml=renderSeal(res.finalPass?'정답으로 인정':'오답','정답판정 '+res.rate.toFixed(0)+'% · '+res.passCount+'/'+res.total,res.finalPass?'pass':'fail');
      var catRows=CATS.map(function(c,i){return'<div class="tally-line"><span>'+c.label+'</span><span>'+res.catAvg[i].toFixed(1)+' / 10</span></div>';}).join('');
      var rawTable='';
      if(isJudge()){var rows2=res.breakdown.map(function(b){var person=appState.roster.find(function(r){return r.id===b.id;});var nm=person?person.name:'익명';return'<tr><td class="name">'+escapeHtml(nm)+'</td>'+b.vals.map(function(v){return'<td>'+v+'</td>';}).join('')+'<td>'+b.avg.toFixed(1)+'</td><td class="'+(b.pass?'pass-yes':'pass-no')+'">'+(b.pass?'정답':'오답')+'</td></tr>';}).join('');rawTable='<details class="raw"><summary>평가자별 채점 원본 보기</summary><table class="evaltable"><thead><tr><th>평가자</th><th>맥락</th><th>문맥</th><th>합리</th><th>유사</th><th>상세</th><th>평균</th><th>판정</th></tr></thead><tbody>'+rows2+'</tbody></table></details>';}
      el.innerHTML='<div class="seal-wrap">'+sealHtml+'</div>'+catRows+rawTable;
    }
    return;
  }
  var cres=computeConsentResult(votes,poll.denom,poll.preset,poll.override);
  if(poll.status==='open'){
    el.innerHTML='<div class="tally-line"><span>찬성 '+cres.yes+' · 반대 '+cres.no+'</span><span>제출 '+cres.submitted+'명</span></div><div class="bar-track"><div class="bar-fill teal" style="width:'+(cres.N?Math.min(cres.yes/cres.N*100,100):0)+'%"></div></div><p style="font-size:11.5px;color:var(--text-soft);margin:0;">의결 기준: '+escapeHtml(cres.label)+'</p>';
    // chiefvote/chair(전담 평가원 선임·재선임): 반대자 이름은 출제자에게만 표시
    if(isDisagreeRevealPreset(poll.preset) && isQuestioner() && cres.no>0){
      var disagreeNames=Object.keys(votes).filter(function(id){return votes[id]==='반대';}).map(function(id){var p=appState.roster.find(function(r){return r.id===id;});return p?p.name:'(알 수 없음)';});
      el.innerHTML+='<div class="a-reason" style="margin-top:8px;font-size:12px;">🔒 반대자 (출제자 공개): '+escapeHtml(disagreeNames.join(', '))+'</div>';
    }
  } else {
    var sealHtml2=renderSeal(cres.pass?'가결':'부결',escapeHtml(cres.label)+' · 찬성 '+cres.yes+'/'+cres.N,cres.pass?'pass':'fail');
    el.innerHTML='<div class="seal-wrap">'+sealHtml2+'</div>';
    // chiefvote/chair 마감 후: 반대자 이름 출제자에게만 표시
    if(isDisagreeRevealPreset(poll.preset) && isQuestioner() && cres.no>0){
      var freshVotes=appState.votes||{};
      var disagreeNames=Object.keys(freshVotes).filter(function(id){return freshVotes[id]==='반대';}).map(function(id){var p=appState.roster.find(function(r){return r.id===id;});return p?p.name:'(알 수 없음)';});
      if(disagreeNames.length>0) el.innerHTML+='<div class="a-reason" style="margin-top:8px;font-size:12px;">🔒 반대자 (출제자 공개): '+escapeHtml(disagreeNames.join(', '))+'</div>';
    }
  }
}

async function handleClosePoll(){
  var poll=appState.activePoll;if(!poll)return;
  // delegate to finalizePoll to handle closing logic
  await finalizePoll(poll);
  await refreshAll(true);
}

async function finalizePoll(poll){
  try{
    var freshVotes=await fetchVotes(poll.id);
    var result=poll.type==='score'?computeScoreResult(freshVotes,poll.denom):computeConsentResult(freshVotes,poll.denom,poll.preset,poll.override);
    // 반대가 2인 이상일 경우 출제자 지명 절차 자동 시작 (로그 및 공지)
    try{
      if(result.no>=2){
        await saveAudit('trigger_designate_questioner',{pollId:poll.id,no:result.no});
        await storageSet('nomination_pending',JSON.stringify({startedAt:Date.now(),triggerPollId:poll.id}));
        await createApprovalWithLog({type:'question',title:'[출제자 지명 절차 시작]',body:'반대 2인 이상 발생하여 출제자 지명 절차가 시작됩니다. 평가장이 후보 중 선택하세요.',authorId:currentUser?currentUser.id:null,authorName:currentUser?currentUser.name:'시스템',isNotice:true});
      }
    }catch(e){console.error('nomination trigger failed',e);}    
    await closePollWithResult(poll,result);
    try{await saveAudit('poll_closed',{pollId:poll.id,result:result});}catch(e){}
    // 평가장 선임 투표 결과 반영
    if(poll.preset==='chiefvote'&&result.pass&&poll.candidateId){
      await saveChief({id:poll.candidateId,name:poll.candidateName,appointedAt:Date.now()});
      try{await saveAudit('chief_assigned',{id:poll.candidateId,name:poll.candidateName,pollId:poll.id});}catch(e){}
    }
    // 전담 평가원 선임 부결 시 반대자 리스트 저장 (출제자가 선택하도록 대기)
    if(poll.preset && poll.preset.indexOf && poll.preset.indexOf('chair:')===0 && !result.pass && freshVotes){
      try{
        var chairRole=poll.preset.split(':')[1];
        var disagreeIds=Object.keys(freshVotes).filter(function(id){return freshVotes[id]!=='찬성';});
        if(disagreeIds&&disagreeIds.length>0){
          var disagreePersons=disagreeIds.map(function(id){var p=appState.roster.find(function(r){return r.id===id;});return{id:id,name:p?p.name:'(알 수 없음)'};});
          appState.chairAutoSelectDisagreers={role:chairRole,failedPollId:poll.id,disagreeList:disagreePersons};
          var roleLabel=chairRole==='approve'?'승인 전담':chairRole==='question'?'질문 전담':chairRole==='answer'?'정답 전담':chairRole==='rule'?'규칙 전담':chairRole==='approval_only'?'승인만 전담':'전담';
          await saveAudit('chair_'+chairRole+'_failed_waitforselect',{failedPollId:poll.id,disagreeCount:disagreePersons.length,disagreeList:disagreePersons});
          await createApprovalWithLog({type:'question',title:'['+roleLabel+' 평가원 재선임 대기]',body:roleLabel+' 평가원 선임이 부결되었습니다. 출제자가 다음 후보를 선택하세요.',authorId:currentUser?currentUser.id:null,authorName:currentUser?currentUser.name:'시스템',isNotice:true});
        }
      }catch(e){console.error('chair vote fail wait for select',e);}    
    }
    // 전담 평가원 선임 성공 시 데이터 저장
    if(poll.preset && poll.preset.indexOf && poll.preset.indexOf('chair:')===0 && result.pass && poll.candidateId){
      try{
        var chairRole=poll.preset.split(':')[1];
        var chairs=await fetchChairs()||{};
        chairs[chairRole]={id:poll.candidateId,name:poll.candidateName,appointedAt:Date.now()};
        await saveChairs(chairs);
        await saveAudit('chair_assigned',{role:chairRole,id:poll.candidateId,name:poll.candidateName,pollId:poll.id});
      }catch(e){console.error('apply chair result',e);}    
    }
    // 평가장 선임 부결 시 자동 재시도 절차
    if(poll.preset==='chiefvote' && !result.pass){
      try{
        await saveAudit('chiefvote_failed',{pollId:poll.id,yes:result.yes||0,no:result.no||0});
        // 자동 재발의: 간단히 동일 기준으로 재발의하도록 함
        await createPollWithLog({type:'consent',preset:'chiefvote',title:'평가장 선임 재시도 — 재발의',detail:'이전 선임안이 부결되어 재발의가 자동으로 시작됩니다.',denom:poll.denom||Math.max(appState.roster.filter(function(r){return r.role==='평가자';}).length,1),voterRole:'평가자'});
      }catch(e){console.error('chiefvote retry failed',e);}    
    }
    // 질문 합의 처리
    if(poll.preset==='qagree'){
      if(result.pass && poll.proposedQuestion){
        var qs=await fetchQuestions();
        var qno=qs.length+1;
        var qObj=Object.assign({},poll.proposedQuestion,{no:qno,status:'pending'});
        qs.push(qObj);
        await saveQuestions(qs);
        await createApprovalWithLog({type:'question',title:'[상정 완료] 질문 Q'+qno+' 등록',body:'질문이 합의되어 상정되었습니다: '+qObj.text,authorId:currentUser?currentUser.id:null,authorName:currentUser?currentUser.name:'시스템',isNotice:true,relatedQuestionId:qObj.id});
      } else if(!result.pass && poll.proposedQuestion){
        await createApprovalWithLog({type:'question',title:'[상정 기각] 질문 제안 불가',body:'제안된 질문이 합의되지 않아 상정되지 않았습니다. 제안: '+(poll.proposedQuestion&&poll.proposedQuestion.text||'(없음)'),authorId:currentUser?currentUser.id:null,authorName:currentUser?currentUser.name:'시스템',isNotice:true,relatedQuestionId:poll.proposedQuestion&&poll.proposedQuestion.id});
      }
    }
  }catch(e){console.error('finalizePoll error',e);}  
}

      try{clearLocalDraft('composer:consent');}catch(e){}

  // Composer autosave & restore (local drafts)

      ['scoreTitle','scoreDetail','scoreDenom','scoreExpire'].forEach(function(id){var el=document.getElementById(id); if(!el) return; el.addEventListener('input', function(){ try{ saveLocalDraft('composer:score', { title: document.getElementById('scoreTitle')?document.getElementById('scoreTitle').value.trim():'', detail: document.getElementById('scoreDetail')?document.getElementById('scoreDetail').value.trim():'', denom: document.getElementById('scoreDenom')?Number(document.getElementById('scoreDenom').value):null, expires: document.getElementById('scoreExpire')?document.getElementById('scoreExpire').value:'' }); }catch(e){} }); });

      ['chiefDetail','chiefDenom','chiefExpire'].forEach(function(id){var el=document.getElementById(id); if(!el) return; el.addEventListener('input', function(){ try{ saveLocalDraft('composer:chief', { detail: document.getElementById('chiefDetail')?document.getElementById('chiefDetail').value.trim():'', denom: document.getElementById('chiefDenom')?Number(document.getElementById('chiefDenom').value):null, expires: document.getElementById('chiefExpire')?document.getElementById('chiefExpire').value:'', candidateId: document.getElementById('chiefCandidate')?document.getElementById('chiefCandidate').value:null }); }catch(e){} }); });
      var chiefCandidateSel=document.getElementById('chiefCandidate');
      if(chiefCandidateSel){ chiefCandidateSel.addEventListener('change', function(){ try{ saveLocalDraft('composer:chief', { detail: document.getElementById('chiefDetail')?document.getElementById('chiefDetail').value.trim():'', denom: document.getElementById('chiefDenom')?Number(document.getElementById('chiefDenom').value):null, expires: document.getElementById('chiefExpire')?document.getElementById('chiefExpire').value:'', candidateId: document.getElementById('chiefCandidate')?document.getElementById('chiefCandidate').value:null }); }catch(e){} }); }

      // consent composer

/* =====================================================
   TAB: 승인·이의제기
===================================================== */
function renderApproveTab(){
  var box=document.getElementById('tabContent');
  if(!box) return;
  var aps=appState.approvals;
  var pending=aps.filter(function(a){return a.status==='pending';});
  var objected=aps.filter(function(a){return a.status==='objected';});
var done=aps.filter(function(a){
  return a.status==='approved'
      || a.status==='rejected'
      || a.status==='rejected_final';
});

  var html='';

  // ==================== 섹션 1: 출제자 - 정답 승인, 답변 승인 ====================
  if(isQuestioner()){
    // try restore draft type first so UI reflects user's last selection across refreshes
    var dap = null;
    try{ dap = loadLocalDraft('composer:approval'); }catch(e){}
    var defaultAType = (appState.approvalComposeType) || (dap && dap.atype) || 'correct';
    html+='<section><div class="section-label"><span class="no mono">제출</span><span class="name">승인 요청</span></div>'+
      '<div class="card" id="approvalComposer">'+
        '<div class="tabs" id="approvalTypeTabs">'+
          '<button class="tab-btn" data-atype="correct">정답 승인</button>'+
          '<button class="tab-btn" data-atype="answer">답변 승인</button>'+
        '</div>'+
        '<div class="field"><label for="apTitle">제목</label><input type="text" id="apTitle" placeholder="예: 1번 질문 답변"/></div>'+
        '<div class="field"><label for="apBody">내용</label><textarea id="apBody" placeholder="정답 또는 답변 내용을 입력하세요..."></textarea></div>'+
        '<button id="submitApproval" type="button" class="btn btn-primary">승인 요청 제출</button>'+
      '</div></section>';
    // store chosen type to appState so re-renders keep it
    appState.approvalComposeType = defaultAType;
  }

  // ==================== 섹션 2: 참가자 - 정답 제출 합의 (Phase 1) ====================
  if(isPlayer()){
    html+='<section><div class="section-label"><span class="no mono">제출</span><span class="name">정답 제출 합의</span></div>'+
      '<div class="card" id="answerSubmitComposer">'+
        '<div class="hint" style="margin-bottom:10px;">🎯 참가자들이 함께 정답을 제시합니다. (전체 참가자의 5분의 4 이상 찬성 필요)</div>'+
        '<div class="field"><label for="asBody">정답</label><textarea id="asBody" placeholder="최종 정답을 입력하세요..."></textarea></div>'+
        '<button id="submitAnswerProposal" type="button" class="btn btn-primary">정답 제출</button>'+
      '</div></section>';
  }

  // ==================== 섹션 3: 평가자 - 정답 평가 (Phase 2) ====================
  if(isJudge()){
    html+='<section><div class="section-label"><span class="no mono">제출</span><span class="name">정답 평가</span></div>'+
      '<div class="hint" style="margin-bottom:10px;">📊 참가자들이 제출한 정답을 5개 항목으로 평가합니다.</div>'+
      '<div class="card" id="answerEvalComposer" style="display:none;">'+
        '<p style="font-size:12px;color:var(--text-soft);">평가 대상 정답이 없습니다. 참가자들이 정답을 제출한 후 평가를 진행하세요.</p>'+
      '</div></section>';
  }

  // 참가자: 질문 합의 후 질문 제출 (단, 여기서는 approve 탭이므로 간략 안내)
  // 이의제기 현황
  if(objected.length>0){
    html+='<section><div class="section-label"><span class="no mono">이의</span><span class="name">이의제기 검토 중</span></div>';
    html+=objected.map(function(a){return renderApprovalItem(a);}).join('');
    html+='</section>';
  }

  // 대기 중
  // ⚠ 이전에는 이 섹션 전체가 참가자에게 숨겨져 있어, 참가자 본인이 제출한 '정답 제출 합의' 카드도
  // 본인에게 보이지 않아 투표 자체가 불가능한 치명적 버그가 있었음.
  // 비밀이 필요한 항목(정답/답변 승인 등)은 renderApprovalItem 내부에서 본문을 이미 비공개 처리하므로
  // 목록 자체는 모든 역할에 노출해도 안전함 — 그대로 노출하도록 수정.
  {

  html+='<section><div class="section-label"><span class="no mono">대기</span><span class="name">승인 대기 ('+pending.length+'건)</span></div>';

  if(pending.length===0){
    html+='<div class="card empty">대기 중인 승인 요청이 없습니다.</div>';
  }else{
    html+=pending.map(function(a){
      return renderApprovalItem(a);
    }).join('');
  }

  html+='</section>';

}

  // 완료 — 참가자에게는 승인된 항목만, 거부된 경우 "승인 거부" 사실만 표시
  if(done.length>0){
    html+='<section><div class="section-label"><span class="no mono">완료</span><span class="name">처리 완료</span></div>';
    if(isPlayer()){
      // 참가자: 승인된 것만 내용 표시, 거부는 사실만
      var playerDoneHtml='';
      done.slice(0,10).forEach(function(a){
        if(a.status==='approved'){
          // questionReject: 반려 사실만 (사유 없이)
          if(a.type==='questionReject'){
            playerDoneHtml+='<div class="approval-item"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span class="a-type">질문 반려</span><span class="status-pill approved">승인</span></div><div class="a-title">'+escapeHtml(a.title)+'</div><div class="a-meta">처리 완료 · '+timeAgo(a.reviewedAt||a.createdAt)+'</div><div class="a-body">⛔ 이 질문은 반려 처리되었습니다.</div></div>';
          } else {
            playerDoneHtml+=renderApprovalItem(a,true);
          }
        } else if(a.status==='rejected'||a.status==='rejected_final'){
          // 거부: 제목과 거부 사실만
          playerDoneHtml+='<div class="approval-item"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span class="a-type">'+(ATYPE_LABEL[a.type]||a.type)+'</span><span class="status-pill rejected">승인 거부</span></div><div class="a-title">'+escapeHtml(a.title)+'</div><div class="a-meta">처리 완료 · '+timeAgo(a.reviewedAt||a.createdAt)+'</div><div class="a-body" style="color:var(--text-soft);">승인이 거부되었습니다.</div></div>';
        }
      });
      html+=playerDoneHtml||'<div class="card empty">처리 완료 항목이 없습니다.</div>';
    } else {
      html+=done.slice(0,5).map(function(a){return renderApprovalItem(a,true);}).join('');
    }
    html+='</section>';
  }

  box.innerHTML=html;

  // 출제자 제출 폼 이벤트
  if(isQuestioner()){
    var currentAType = appState.approvalComposeType || 'correct';
    box.querySelectorAll('#approvalTypeTabs .tab-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        currentAType=btn.getAttribute('data-atype');
        box.querySelectorAll('#approvalTypeTabs .tab-btn').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        // persist selection across re-renders and save into draft
        try{ appState.approvalComposeType = currentAType; }catch(e){}
        try{ var t = document.getElementById('apTitle')?document.getElementById('apTitle').value.trim():''; var bdy = document.getElementById('apBody')?document.getElementById('apBody').value.trim():''; saveLocalDraft('composer:approval',{title:t, body:bdy, atype:currentAType}); }catch(e){}
      });
    });
    // ensure correct tab shows active state after render
    box.querySelectorAll('#approvalTypeTabs .tab-btn').forEach(function(b){ if(b.getAttribute('data-atype')===currentAType) b.classList.add('active'); else b.classList.remove('active'); });
    var submitAp=document.getElementById('submitApproval');
    // restore draft
    try{var dap=loadLocalDraft('composer:approval'); if(dap){ if(document.getElementById('apTitle')) document.getElementById('apTitle').value=dap.title||''; if(document.getElementById('apBody')) document.getElementById('apBody').value=dap.body||''; if(dap.atype){ try{ appState.approvalComposeType = dap.atype; }catch(e){} } }}catch(e){}
    if(document.getElementById('apTitle')) document.getElementById('apTitle').addEventListener('input',function(){ try{ saveLocalDraft('composer:approval',{title:document.getElementById('apTitle')?document.getElementById('apTitle').value.trim():'', body:document.getElementById('apBody')?document.getElementById('apBody').value.trim():'', atype:currentAType}); }catch(e){} });
    if(document.getElementById('apBody')) document.getElementById('apBody').addEventListener('input',function(){ try{ saveLocalDraft('composer:approval',{title:document.getElementById('apTitle')?document.getElementById('apTitle').value.trim():'', body:document.getElementById('apBody')?document.getElementById('apBody').value.trim():'', atype:currentAType}); }catch(e){} });
    if(submitAp) submitAp.addEventListener('click',async function(){
      var title=document.getElementById('apTitle').value.trim();
      var body=document.getElementById('apBody').value.trim();
      if(!title||!body){alert('제목과 내용을 모두 입력하세요.');return;}
      await createApprovalWithLog({type:currentAType,title:title,body:body,authorId:currentUser.id,authorName:currentUser.name});
      try{clearLocalDraft('composer:approval');}catch(e){}
      document.getElementById('apTitle').value='';
      document.getElementById('apBody').value='';
      await refreshAll(true);
    });
  }

  // 참가자 정답 제출 폼 이벤트
  if(isPlayer()){
    var submitAnswerProposal = document.getElementById('submitAnswerProposal');
    // draft 복원
    try{var dasb=loadLocalDraft('composer:answerSubmit'); if(dasb && document.getElementById('asBody')) document.getElementById('asBody').value=dasb.body||'';}catch(e){}
    if(document.getElementById('asBody')) document.getElementById('asBody').addEventListener('input',function(){ try{ saveLocalDraft('composer:answerSubmit',{body:document.getElementById('asBody')?document.getElementById('asBody').value.trim():''}); }catch(e){} });
    if(submitAnswerProposal) submitAnswerProposal.addEventListener('click',async function(){
      var answerText = document.getElementById('asBody').value.trim();
      if(!answerText){alert('정답을 입력하세요.');return;}
      await createApprovalWithLog({
        type:'answerSubmit',
        title:'정답 제출',
        answerText:answerText,
        authorId:currentUser.id,
        authorName:currentUser.name,
        votes:{},
        body:answerText
      });
      try{clearLocalDraft('composer:answerSubmit');}catch(e){}
      document.getElementById('asBody').value='';
      await refreshAll(true);
    });
  }

  // 평가자: 승인/거부 버튼
  attachApprovalEvents(box,aps);
}

function renderApprovalItem(a, compact){

      '<span class="a-type">'+escapeHtml(typeLabel)+'</span>'+
      '<span class="status-pill '+statusClass[a.status]+'">'+escapeHtml(statusLabel[a.status]||a.status)+'</span>'+
    '</div>'+
    '<div class="a-title">'+escapeHtml(a.title)+'</div>'+

  '</div>';
    

// compact 모드에서도 body와 거부 사유를 표시 (처리 완료 목록에서 내용 확인 가능)
  if(compact){
    if(a.body){
      html+='<div class="a-body" style="font-size:12px;opacity:0.8;margin-bottom:6px;">'+escapeHtml(a.body.length>120?a.body.slice(0,120)+'...':a.body)+'</div>';
    }
  }

if(!compact){

  // ==================== Phase 1: answerSubmit - 참가자 정답 제출 투표 ====================
  if(a.type === 'answerSubmit'){
    html+='<div class="a-body" style="font-weight:600;margin-bottom:10px;">📝 제출 정답</div>'+
      '<div style="padding:10px;background:rgba(100,150,200,0.1);border-radius:6px;margin-bottom:10px;font-size:14px;line-height:1.5;">'+
      escapeHtml(a.answerText)+
      '</div>';
    
    // 투표 통계
    a.votes = a.votes || {};
    var voteKeys = Object.keys(a.votes);
    var yesCount = voteKeys.filter(function(k){return a.votes[k]===true;}).length;
    var noCount = voteKeys.filter(function(k){return a.votes[k]===false;}).length;
    var totalPlayers = appState.roster.filter(function(r){return r.role==='참가자';}).length;
    var requiredVotes = Math.ceil(totalPlayers * 4 / 5); // 5분의 4
    var passedThreshold = yesCount >= requiredVotes;
    
    html+='<div style="font-size:12px;margin-bottom:8px;">'+
      '<span style="color:var(--text-success);">✅ 찬성: '+yesCount+'</span> / '+
      '<span style="color:var(--text-danger);">❌ 반대: '+noCount+'</span> / '+
      '<span>필요: '+requiredVotes+'명</span>'+
    '</div>';
    
    html+='<div style="width:100%;height:20px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-bottom:8px;">'+
      '<div style="height:100%;background:'+(passedThreshold?'#4CAF50':'#f44336')+';width:'+Math.min(100,Math.round(yesCount/requiredVotes*100))+'%;transition:width 0.3s;"></div>'+
    '</div>';
    
    // 참가자만 투표 가능 (단, 합의가 이미 종료된 의안은 추가 투표를 받지 않음 — 중복 평가 생성 방지)
    if(isPlayer()){
      var myVote = a.votes[currentUser.id];
      if(a.status!=='pending'){
        html+='<div style="padding:8px;background:rgba(0,0,0,0.05);border-radius:6px;font-size:12px;">'+
          '✅ 합의가 종료되어 평가 단계로 넘어갔습니다.'+

        '</div>';

        html+='<div style="display:flex;gap:8px;margin-bottom:10px;">'+

        html+='<div style="padding:8px;background:rgba(0,0,0,0.05);border-radius:6px;font-size:12px;">'+

        '</div>';
      }
    }
  }
  
  // ==================== Phase 2: answerEval - 평가자 정답 평가 ====================
  else if(a.type === 'answerEval'){
    html+='<div class="a-body" style="font-weight:600;margin-bottom:10px;">📝 평가 대상 정답</div>'+
      '<div style="padding:10px;background:rgba(100,150,200,0.1);border-radius:6px;margin-bottom:10px;font-size:14px;line-height:1.5;">'+
      escapeHtml(a.answerText)+
      '</div>';
    
    a.scores = a.scores || {};
    var judges = appState.roster.filter(function(r){return r.role==='평가자';});
    var judgesEvaluated = Object.keys(a.scores).length;
    var totalJudges = judges.length;
    
    // 평가자만 평가 가능
    if(isJudge() && a.status==='pending'){
      var myScores = a.scores[currentUser.id];
      if(!myScores){
        html+='<div style="margin-bottom:12px;"><div style="font-weight:600;margin-bottom:8px;">📊 평가 항목 (각 항목 0-10점)</div>';
        CATS.forEach(function(cat){
          html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'+
            '<label style="width:70px;font-size:12.5px;">'+escapeHtml(cat.label)+'</label>'+
            '<input type="number" class="ae-score" id="score_'+escapeHtml(a.id)+'_'+escapeHtml(cat.key)+'" min="0" max="10" value="5" style="width:50px;"/>'+
            '<span style="font-size:11px;color:var(--text-soft);">점</span>'+
          '</div>';
        });
        // ⚠ 누락되어 있던 평가 제출 버튼 추가 (기존에는 이 버튼이 없어 평가자가 점수를 확정 제출할 방법이 없었음)

        html+='</div>';
      }else{
        html+='<div style="margin-bottom:12px;"><div style="font-weight:600;margin-bottom:8px;">✅ 귀하의 평가 완료</div>';
        CATS.forEach(function(cat){
          var score = myScores[cat.key] || 0;
          html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px;">'+
            '<span style="width:70px;">'+escapeHtml(cat.label)+':</span>'+
            '<span style="font-weight:600;color:var(--gold);">'+score+'점</span>'+
          '</div>';
        });
        html+='</div>';
      }
    }
    
    // 평가 진행률 표시
    if(totalJudges > 0){
      html+='<div style="font-size:12px;margin-bottom:8px;">평가 진행: '+judgesEvaluated+' / '+totalJudges+' 평가자</div>';
      html+='<div style="width:100%;height:16px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-bottom:10px;">'+
        '<div style="height:100%;background:#2196F3;width:'+(totalJudges>0?Math.round(judgesEvaluated/totalJudges*100):0)+'%;transition:width 0.3s;"></div>'+
      '</div>';
    }
    
    // ==================== 평가 결과 공개 (status==='approved' 또는 모든 평가 완료) ====================
    var shouldShowResults = a.status==='approved' || (judgesEvaluated === totalJudges && totalJudges > 0);
    
    if(shouldShowResults && totalJudges > 0){
      var allScores = {};
      CATS.forEach(function(cat){allScores[cat.key]=[];});
      Object.keys(a.scores).forEach(function(jid){
        CATS.forEach(function(cat){
          if(a.scores[jid][cat.key] !== undefined){
            allScores[cat.key].push(a.scores[jid][cat.key]);
          }
        });
      });
      
      var averages = {};
      var allPassed = true;
      CATS.forEach(function(cat){
        var scores = allScores[cat.key];
        averages[cat.key] = scores.length>0?scores.reduce(function(a,b){return a+b;})/scores.length:0;
        if(averages[cat.key] <= 6 && cat.key !== 'sim'){allPassed=false;}
        if(cat.key === 'sim' && averages[cat.key] < 7){allPassed=false;}
      });
      
      var avgAll = Object.keys(averages).reduce(function(a,k){return a+averages[k];},0)/CATS.length;
      if(avgAll <= 8){allPassed=false;}
      
      // ==================== 최종 판정 결과 표시 ====================
      var consensus = a.consensus || {passed: allPassed, percentage: '계산 중'};
      var isCorrect = consensus.passed;
      
      html+='<div style="margin-top:12px;padding:12px;background:'+(isCorrect?'rgba(46,108,94,0.15)':'rgba(162,58,44,0.15)')+';border-radius:6px;border-left:4px solid '+(isCorrect?'#7dd9c8':'#ff9999')+';"><div style="font-weight:600;margin-bottom:10px;font-size:14px;color:'+(isCorrect?'#2d7d6e':'#b43929')+';">'+(isCorrect?'✅ 정답 승인':'❌ 정답 불가')+'</div>';
      
      html+='<div style="margin-bottom:8px;font-size:12px;">'+
        '<span style="font-weight:600;">평가 결과:</span><br/>';
      
      CATS.forEach(function(cat){
        var score = averages[cat.key];
        var status = (cat.key === 'sim' ? score >= 7 : score > 6) ? '✅' : '⚠️';
        html+='<div style="margin-top:4px;">'+status+' '+escapeHtml(cat.label)+': <span style="font-weight:600;color:var(--gold);">'+score.toFixed(1)+'점</span></div>';
      });
      
      html+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.1);"><span style="font-weight:600;">평균:</span> <span style="color:var(--gold);font-weight:600;">'+avgAll.toFixed(1)+'점</span> / <span style="font-size:11px;color:var(--text-soft);">평가자 '+totalJudges+'명</span></div>';
      
      if(consensus.passed !== undefined && consensus.totalCount !== undefined){
        html+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.1);font-size:12px;"><span style="font-weight:600;">합의율:</span> '+consensus.approvedCount+' / '+consensus.totalCount+' 평가자 ('+consensus.percentage+'%)</div>';
      }
      
      html+='</div>';
    }
    
    // ==================== Phase 2: 오답 피드백 (오답 상태일 때) ====================

        // 평가자 피드백 입력

              '<textarea class="feedback-text" id="feedback_'+escapeHtml(a.id)+'" style="min-height:80px;width:100%;" placeholder="개선 의견이나 조언을 작성해주세요..."></textarea>'+
              '<button class="btn btn-secondary btn-sm submit-feedback" data-id="'+escapeHtml(a.id)+'" style="margin-top:8px;">피드백 제출</button>'+
            '</div>';
          }else{
            html+='<div style="margin-bottom:12px;padding:8px;background:rgba(0,0,0,0.05);border-radius:6px;font-size:12px;">'+

          }
        }
        
        // 피드백 목록 표시
        a.feedbacks = a.feedbacks || {};

        if(feedbackKeys.length > 0){
          html+='<div style="margin-top:12px;border-top:1px solid rgba(0,0,0,0.1);padding-top:12px;"><div style="font-weight:600;margin-bottom:8px;">📝 평가자 피드백</div>';
          feedbackKeys.forEach(function(jid){

          html+='</div>';
        }
        
        html+='</div>';
      }
    }
  }
  
  // ==================== Phase 3 이상: 기존 approval 렌더링 ====================
  else{

    }else if(a.status==='approved'){

          html+='<div class="a-body">'+escapeHtml(a.body)+'</div>';

      } else {

        if(a.authorNote && !isPlayer()){

      }
    }else if(a.status==='rejected'||a.status==='rejected_final'){
      // 거부된 경우: 참가자에게는 내용 비공개

      html+='<div class="a-body">'+escapeHtml(a.body)+'</div>';

}

      html+='<div class="a-objection">⚖ 이의제기 ('+escapeHtml(a.objectorName||'?')+'): '+escapeHtml(a.objectionBody)+'</div>';
    }
  }
  // 이의 검토자 의견 (원심 평가자) — 참가자에게는 비공개
  if(a.objectionOpinion && !isPlayer()){
    html+='<div class="a-reason violet">📋 원심 의견: '+escapeHtml(a.objectionOpinion)+'</div>';
  }
  // ← 이의제기 인용 사유 표시 — 참가자에게는 비공개
  if(a.objectionAcceptReason && !isPlayer()){
    html+='<div class="a-reason green">✅ 이의 인용 사유: '+escapeHtml(a.objectionAcceptReason)+'</div>';
  }



    if(a.status==='pending'){
      // ⚠ 승인 권한 제한: 시행령 제4조의4①·제4조의5①에 따라 출제자가 제출한 정답/답변은
      // 반드시 '평가자'의 검토·승인을 받아야 하며, 제출자인 출제자 본인이 스스로 승인/거부할 수 없다.

    if(a.status==='objected'){

        html+='<div style="margin-top:8px;" id="opinionBox_'+escapeHtml(a.id)+'">'+
          '<div class="field"><label>원심 의견 제시 (선택)</label><textarea class="opinion-text" id="opinion_'+escapeHtml(a.id)+'" style="min-height:60px;" placeholder="이의제기에 대한 의견을 입력하세요..."></textarea></div>'+
          '<button class="btn btn-secondary btn-sm submit-opinion" data-id="'+escapeHtml(a.id)+'">의견 제출</button>'+
        '</div>';
      } else if(!isOriginalJudge && isJudge()){
        html+='<div class="btn-row" style="margin-top:10px;">'+
          '<button class="btn btn-approve btn-sm obj-accept" data-id="'+escapeHtml(a.id)+'">이의 인용 (원심 파기)</button>'+
          '<button class="btn btn-reject btn-sm obj-deny" data-id="'+escapeHtml(a.id)+'">이의 기각 (원심 유지)</button>'+
        '</div>';
      } else if(!isJudge()){
        if(isPlayer()){
          html+='<div class="hint" style="margin-top:10px;color:var(--text-soft);">⏳ 이의제기 검토 중입니다.</div>';
        } else {
          html+='<div class="hint" style="margin-top:10px;color:var(--text-soft);">⏳ 나머지 평가자의 이의제기 검토 대기 중입니다.</div>';
        }
      }
    }
  }

  // 거부 사유 — 참가자에게는 비공개 (출제자·평가자만 열람)
  if(a.rejectReason && !isPlayer()){
    html+='<div class="a-reason" style="margin-top:8px;margin-bottom:4px;">⛔ <strong>거부 사유:</strong> '+escapeHtml(a.rejectReason)+'</div>';
  }
  // 이의제기 기각 사유 — compact 여부와 무관하게 항상 표시
  if(a.objectionDenyReason){
    html+='<div class="a-reason" style="margin-top:8px;margin-bottom:4px;">❌ <strong>이의 기각 사유:</strong> '+escapeHtml(a.objectionDenyReason)+'</div>';
  }
  // 출제자: 거부된 경우 이의제기 또는 재제출
  if(isQuestioner() && a.status==='rejected'){
    html+='<div style="margin-top:8px;">'+
      '<div class="field"><label>이의제기 사유</label><textarea class="objection-text" id="objection_'+escapeHtml(a.id)+'" style="min-height:60px;" placeholder="이의제기 사유를 명시하세요..."></textarea></div>'+
      '<div class="btn-row">'+
        '<button class="btn btn-secondary btn-sm raise-objection" data-id="'+escapeHtml(a.id)+'">이의제기 제출</button>'+
      '</div>'+
    '</div>';
  }

  // 이의제기 인용 후: 출제자에게 통보 (환송 상태 표시)
  if(a.status==='approved'&&a.objectionAccepted){
    html+='<div class="notify-banner">✅ 이의제기가 인용되어 재승인 처리되었습니다.</div>';
  }

  // 승인된 항목에 대해 출제자가 승인의 이유를 작성할 수 있도록 함
  if(a.status==='approved' && a.authorId===currentUser.id && !a.approvalReason){
    html+='<div style="margin-top:8px;">'+
      '<div class="field"><label>승인 이유 작성 (출제자)</label><textarea class="author-reason" id="reason_'+escapeHtml(a.id)+'" style="min-height:60px;" placeholder="승인된 답변/정답에 대한 설명을 입력하세요..."></textarea></div>'+
      '<button class="btn btn-primary btn-sm submit-author-reason" data-id="'+escapeHtml(a.id)+'">승인 이유 제출</button>'+
    '</div>';
  }

  // 평가장: 재량으로 즉시 승인/기각할 수 있는 버튼
  if(isChief() && a.status==='pending'){
    html+='<div class="btn-row" style="margin-top:10px;">'+
      '<button class="btn btn-approve btn-sm chief-approve" data-id="'+escapeHtml(a.id)+'">재량으로 승인</button>'+
      '<button class="btn btn-reject btn-sm chief-reject" data-id="'+escapeHtml(a.id)+'">재량으로 기각</button>'+
    '</div>';
  }

  html+='</div>';
  return html;
}

function attachApprovalEvents(box, aps){
  // 평가자: 승인 버튼
  box.querySelectorAll('.ap-approve').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // ⚠ 방어적 권한 검사: 평가자만 승인 가능 (출제자의 자기 승인 방지)
      if(!isJudge()){alert('승인 권한은 평가자에게만 있습니다.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      
      // ==================== Phase 2: answerEval 점수 저장 ====================
      if(ap.type==='answerEval' && isJudge()){
        try{
          ap.scores = ap.scores || {};
          ap.scores[currentUser.id] = {};
          CATS.forEach(function(cat){
            var scoreEl = document.getElementById('score_'+ap.id+'_'+cat.key);
            if(scoreEl){
              ap.scores[currentUser.id][cat.key] = Number(scoreEl.value) || 0;
            }
          });
          
          // 모든 평가자 평가 완료 여부 확인
          var judges = appState.roster.filter(function(r){return r.role==='평가자';});
          var judgesEvaluated = Object.keys(ap.scores).length;
          var totalJudges = judges.length;
          
          // 모든 평가자 평가 완료 시 60% 합의 계산
          if(judgesEvaluated === totalJudges && totalJudges > 0){
            var allScores = {};
            CATS.forEach(function(cat){allScores[cat.key]=[];});
            Object.keys(ap.scores).forEach(function(jid){
              CATS.forEach(function(cat){
                if(ap.scores[jid][cat.key] !== undefined){
                  allScores[cat.key].push(ap.scores[jid][cat.key]);
                }
              });
            });
            
            var averages = {};
            CATS.forEach(function(cat){
              var scores = allScores[cat.key];
              averages[cat.key] = scores.length>0?scores.reduce(function(a,b){return a+b;})/scores.length:0;
            });
            
            var avgAll = Object.keys(averages).reduce(function(a,k){return a+averages[k];},0)/CATS.length;
            var sim = averages['sim']||0;
            
            // 정답 기준: 모든 항목 6점 초과, 평균 8점 초과, 유사성 7점 이상
            var passed = (sim >= 7) && (avgAll > 8);
            
            // 평가자별 기준 충족 여부 계산 (60% 이상 필요)
            var judgesApproved = 0;
            Object.keys(ap.scores).forEach(function(jid){
              var jScores = ap.scores[jid];
              var jAverages = {};
              CATS.forEach(function(cat){
                jAverages[cat.key] = jScores[cat.key] || 0;
              });
              var jAvgAll = Object.keys(jAverages).reduce(function(a,k){return a+jAverages[k];},0)/CATS.length;
              var jSim = jAverages['sim']||0;
              if((jSim >= 7) && (jAvgAll > 8)){
                judgesApproved++;
              }
            });
            
            var consensusPercentage = (judgesApproved / totalJudges * 100).toFixed(2);
            var consensusPassed = judgesApproved >= Math.ceil(totalJudges * 0.6); // 60% 이상
            
            ap.consensus = {
              approvedCount: judgesApproved,
              totalCount: totalJudges,
              percentage: consensusPercentage,
              passed: consensusPassed,
              finalResult: consensusPassed ? 'correct' : 'incorrect'
            };
          }
          
          // 점수 draft 삭제
          try{ clearLocalDraft('approval:scores:'+ap.id); }catch(e){}
        }catch(e){console.error('score save failed', e);}
      }
      
      ap.status='approved';ap.reviewedBy=currentUser.id;ap.reviewedAt=Date.now();
      await saveApproval(ap);
      
      // ← 질문 완료: type이 'answer'이면 관련 질문을 'answered' 상태로 업데이트
      if(ap.type==='answer' && ap.relatedQuestionId){
        try{
          var qs=await fetchQuestions();
          var q=qs.find(function(x){return x.id===ap.relatedQuestionId;});
          if(q){
            q.answer=ap.proposedAnswer||ap.body;
            q.status='answered';
            q.answerApprovedAt=Date.now();
            await saveQuestions(qs);
          }
        }catch(e){console.error('question complete failed',e);}
      }
      
      // ← 질문 반려 승인: type이 'questionReject'이면 관련 질문을 'rejected' 상태로 업데이트
      if(ap.type==='questionReject' && ap.relatedQuestionId){
        try{
          var qs=await fetchQuestions();
          var q=qs.find(function(x){return x.id===ap.relatedQuestionId;});
          if(q){
            q.status='rejected';
            q.rejectedBy=ap.authorName;
            q.rejectedAt=ap.approvedAt||Date.now();
            q.rejectReason=ap.rejectReason||null; // 반려 사유 저장 (참가자 비공개용)
            await saveQuestions(qs);
          }
        }catch(e){console.error('question reject failed',e);}
      }
      
      await refreshAll(true);
    });
  });
  // 평가자: 거부 버튼
  box.querySelectorAll('.ap-reject').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // ⚠ 방어적 권한 검사: 평가자만 거부 가능 (출제자의 자기 거부 방지)
      if(!isJudge()){alert('거부 권한은 평가자에게만 있습니다.');return;}
      var id=btn.getAttribute('data-id');
      var reason=prompt('거부 사유를 입력하세요 (출제자에게 전달됩니다):');
      if(reason===null)return;
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.status='rejected';ap.rejectReason=reason||'(사유 없음)';ap.reviewedBy=currentUser.id;ap.reviewedAt=Date.now();
      await saveApproval(ap);
      
      // ← 질문 반려 거부: type이 'questionReject'이면 질문을 pending으로 복원
      if(ap.type==='questionReject' && ap.relatedQuestionId){
        try{
          var qs=await fetchQuestions();
          var q=qs.find(function(x){return x.id===ap.relatedQuestionId;});
          if(q && q.status==='pending'){
            q.rejectedBy=null;
            q.rejectedAt=null;
            await saveQuestions(qs);
          }
        }catch(e){console.error('question reject revert failed',e);}
      }
      
      await refreshAll(true);
    });
  });
  // 출제자: 이의제기
  box.querySelectorAll('.raise-objection').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var text=document.getElementById('objection_'+id);
      var body=text?text.value.trim():'';
      if(!body){alert('이의제기 사유를 입력하세요.');return;}
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.status='objected';ap.objectionBody=body;ap.objectorId=currentUser.id;ap.objectorName=currentUser.name;ap.objectedAt=Date.now();
      await saveApproval(ap);

      // 이의제기 사실을 평가자들에게 알리는 공지 생성
      await createApprovalWithLog({
        type:'question', // 공지용 (알림)
        title:'[이의제기 통보] '+ap.title,
        body:'출제자 '+escapeHtml(currentUser.name)+'이(가) 이의를 제기했습니다.',
        authorId:currentUser.id,authorName:currentUser.name,isNotice:true,relatedId:id
      });
      await saveAudit('objection_raised',{approvalId:ap.id,objector:currentUser?currentUser.id:null});
      await refreshAll(true);
    });
  });
  // 평가자: 원심 의견 제출
  box.querySelectorAll('.submit-opinion').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var text=document.getElementById('opinion_'+id);
      var body=text?text.value.trim():'';
      if(!body){alert('의견을 입력하세요.');return;}
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.objectionOpinion=body;ap.opinionSubmittedAt=Date.now();
      await saveApproval(ap);await refreshAll(true);
    });
  });
  // 평가자: 이의 인용
  box.querySelectorAll('.obj-accept').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // ⚠ 방어적 권한 검사: 이의 인용 여부 결정은 평가자만 가능
      if(!isJudge()){alert('이의제기 인용 여부 결정 권한은 평가자에게만 있습니다.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      var reason=prompt('이의 인용(원심 파기) 사유를 입력하세요:');
      if(reason===null||!reason.trim()){alert('인용 사유는 필수입니다.');return;}
      // 원심 파기 → 환송 (pending으로 되돌림, 인용 표시)
      ap.status='pending';ap.objectionAccepted=true;ap.objectionAcceptReason=reason.trim();ap.rejectReason=null;ap.objectionBody=null;ap.objectionOpinion=null;ap.reviewedBy=null;ap.objectedAt=Date.now();
      await saveApproval(ap);await saveAudit('objection_accepted',{approvalId:ap.id,by:currentUser?currentUser.id:null,reason:ap.objectionAcceptReason});await refreshAll(true);
    });
  });
  // 평가자: 이의 기각
  box.querySelectorAll('.obj-deny').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // ⚠ 방어적 권한 검사: 이의 기각 여부 결정은 평가자만 가능
      if(!isJudge()){alert('이의제기 기각 여부 결정 권한은 평가자에게만 있습니다.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      var reason=prompt('이의 기각 사유를 입력하세요 (기록에 남습니다):');
      if(reason===null||!reason.trim()){alert('기각 사유는 필수입니다.');return;}
      ap.status='rejected_final';ap.objectionDenyReason=reason.trim();ap.objectionDeniedAt=Date.now();
      await saveApproval(ap);await saveAudit('objection_denied',{approvalId:ap.id,by:currentUser?currentUser.id:null,reason:ap.objectionDenyReason});await refreshAll(true);
    });
  });

  // 출제자: 승인 이유 제출
  box.querySelectorAll('.submit-author-reason').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var ta=document.getElementById('reason_'+id);
      var text=ta?ta.value.trim():'';
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.approvalReason=text||'(설명 없음)';ap.approvalReasonBy=currentUser?currentUser.name:null;ap.approvalReasonAt=Date.now();
      await saveApproval(ap);await refreshAll(true);
    });
  });

  // 평가장: 재량승인/기각
  box.querySelectorAll('.chief-approve').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.status='approved';ap.reviewedBy=currentUser.id;ap.reviewedAt=Date.now();ap.chiefAction='approved';ap.chiefActionAt=Date.now();
      await saveApproval(ap);await refreshAll(true);
    });
  });
  box.querySelectorAll('.chief-reject').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      ap.status='rejected';ap.rejectReason='재량에 의한 기각';ap.reviewedBy=currentUser.id;ap.reviewedAt=Date.now();ap.chiefAction='rejected';ap.chiefActionAt=Date.now();
      await saveApproval(ap);
      
      // ← 질문 반려 재량 기각: type이 'questionReject'이면 질문을 pending으로 복원
      if(ap.type==='questionReject' && ap.relatedQuestionId){
        try{
          var qs=await fetchQuestions();
          var q=qs.find(function(x){return x.id===ap.relatedQuestionId;});
          if(q && q.status==='pending'){
            q.rejectedBy=null;
            q.rejectedAt=null;
            await saveQuestions(qs);
          }
        }catch(e){console.error('question reject revert failed',e);}
      }
      
      await refreshAll(true);
    });
  });

  // ==================== Phase 1: 참가자 정답 제출 투표 ====================
  box.querySelectorAll('.as-vote').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // ⚠ 방어적 권한/상태 검사: 참가자만 투표 가능, 이미 종료된 의안/중복 투표는 차단
      // (이 가드가 없으면 합의 종료 후 추가 투표 시마다 Phase2 평가가 중복 생성되는 버그가 발생함)
      if(!isPlayer()){alert('투표 권한은 참가자에게만 있습니다.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      if(ap.status!=='pending'){alert('이미 합의가 종료된 의안입니다.');return;}
      ap.votes = ap.votes || {};
      if(ap.votes[currentUser.id]!==undefined){alert('이미 투표하셨습니다.');return;}
      var vote=btn.getAttribute('data-vote')==='yes'?true:false;
      
      ap.votes[currentUser.id] = vote;
      
      // 5분의 4 투표율 계산
      var totalPlayers = appState.roster.filter(function(r){return r.role==='참가자';}).length;
      var yesCount = Object.keys(ap.votes).filter(function(k){return ap.votes[k]===true;}).length;
      var requiredVotes = Math.ceil(totalPlayers * 4 / 5);
      
      // 5분의 4 이상 찬성 시 자동 승인 (status가 아직 pending일 때만 — 중복 생성 방지)
      if(ap.status==='pending' && yesCount >= requiredVotes){
        ap.status='approved';
        ap.passed=true;
        ap.approvedAt=Date.now();
        
        // ← 자동으로 Phase 2 (answerEval) 생성
        try{
          await createApprovalWithLog({
            type:'answerEval',
            title:'정답 평가 · '+escapeHtml(ap.answerText.substring(0,30))+'...',
            answerText: ap.answerText,
            relatedSubmissionId: ap.id,
            authorId: null,
            authorName: '시스템',
            scores: {},
            body: ap.answerText
          });
        }catch(e){console.error('answerEval creation failed', e);}
      }
      
      ap.updatedAt=Date.now();
      await saveApproval(ap);
      await saveAudit('answer_submit_vote',{approvalId:ap.id,voter:currentUser?currentUser.id:null,vote:vote?'yes':'no',totalVotes:yesCount,required:requiredVotes});
      await refreshAll(true);
    });
  });

  // ==================== Phase 2: 평가자 평가 제출 (확정) — 기존에 누락되어 있던 기능 ====================
  box.querySelectorAll('.ae-submit').forEach(function(btn){
    btn.addEventListener('click',async function(){
      // ⚠ 방어적 권한/상태 검사
      if(!isJudge()){alert('평가 제출 권한은 평가자에게만 있습니다.');return;}
      var id=btn.getAttribute('data-id');
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      if(ap.type!=='answerEval')return;
      if(ap.status!=='pending'){alert('이미 종료된 평가입니다.');return;}
      ap.scores = ap.scores || {};
      if(ap.scores[currentUser.id]){alert('이미 평가를 제출하셨습니다.');return;}

      ap.scores[currentUser.id] = {};
      CATS.forEach(function(cat){
        var scoreEl = document.getElementById('score_'+ap.id+'_'+cat.key);
        var v = scoreEl ? Number(scoreEl.value) : NaN;
        if(isNaN(v)) v = 0;
        if(v<0) v=0; if(v>10) v=10;
        ap.scores[currentUser.id][cat.key] = v;
      });
      try{ clearLocalDraft('approval:scores:'+ap.id); }catch(e){}

      // 모든 평가자 평가 완료 여부 확인
      var judges = appState.roster.filter(function(r){return r.role==='평가자';});
      var judgesEvaluated = Object.keys(ap.scores).length;
      var totalJudges = judges.length;

      // 모든 평가자 평가 완료 시에만 최종 판정 (룰: 모든 항목 6점 초과, 평균 8점 초과, 유사성 7점 이상 / 시행령 제4조의5⑬: 평가자 60% 이상 정답 판정)
      if(judgesEvaluated === totalJudges && totalJudges > 0){
        var judgesApproved = 0;
        Object.keys(ap.scores).forEach(function(jid){
          var jScores = ap.scores[jid];
          var jAverages = {};
          CATS.forEach(function(cat){ jAverages[cat.key] = jScores[cat.key] || 0; });
          var jAvgAll = Object.keys(jAverages).reduce(function(a,k){return a+jAverages[k];},0)/CATS.length;
          var jAllCatsPassed = true;
          CATS.forEach(function(cat){
            if(cat.key==='sim'){ if(jAverages[cat.key] < 7) jAllCatsPassed=false; }
            else { if(jAverages[cat.key] <= 6) jAllCatsPassed=false; }
          });
          var jPassed = jAllCatsPassed && (jAvgAll > 8);
          if(jPassed) judgesApproved++;
        });

        var consensusPercentage = (judgesApproved / totalJudges * 100).toFixed(2);
        var consensusPassed = judgesApproved >= Math.ceil(totalJudges * 0.6); // 60% 이상

        ap.consensus = {
          approvedCount: judgesApproved,
          totalCount: totalJudges,
          percentage: consensusPercentage,
          passed: consensusPassed,
          finalResult: consensusPassed ? 'correct' : 'incorrect'
        };
        // 전원 평가 완료 시에만 최종 상태 확정 (한 명만 제출했다고 바로 종료되지 않도록 함)
        ap.status = consensusPassed ? 'approved' : 'rejected';
        ap.reviewedBy = currentUser.id;
        ap.reviewedAt = Date.now();
      }

      ap.updatedAt = Date.now();
      await saveApproval(ap);
      await saveAudit('answer_eval_submit',{approvalId:ap.id,judge:currentUser?currentUser.id:null,judgesEvaluated:judgesEvaluated,totalJudges:totalJudges});
      await refreshAll(true);
    });
  });

  // ==================== Phase 2: 평가자 정답 평가 점수 draft 자동 저장 ====================
  CATS.forEach(function(cat){
    box.querySelectorAll('input.ae-score[id$="_'+cat.key+'"]').forEach(function(scoreInput){
      var scoreId = scoreInput.id; // 형식: score_[approvalId]_[catKey]
      var parts = scoreId.split('_');
      var apId = parts[1];
      
      // draft 복원
      try{
        var draftScores = loadLocalDraft('approval:scores:'+apId);
        if(draftScores && draftScores[cat.key] !== undefined){
          scoreInput.value = draftScores[cat.key];
        }
      }catch(e){}
      
      // input 시 draft 저장
      scoreInput.addEventListener('input', function(){
        try{
          var existingDraft = loadLocalDraft('approval:scores:'+apId) || {};
          existingDraft[cat.key] = Number(scoreInput.value) || 0;
          saveLocalDraft('approval:scores:'+apId, existingDraft);
        }catch(e){}
      });
    });
  });

  // ==================== Phase 2: 오답 피드백 제출 ====================
  box.querySelectorAll('.submit-feedback').forEach(function(btn){
    btn.addEventListener('click',async function(){
      var id=btn.getAttribute('data-id');
      var ta=document.getElementById('feedback_'+id);
      var feedback=ta?ta.value.trim():'';
      if(!feedback){alert('피드백을 입력하세요.');return;}
      var ap=aps.find(function(a){return a.id===id;});if(!ap)return;
      
      ap.feedbacks = ap.feedbacks || {};
      ap.feedbacks[currentUser.id] = feedback;
      ap.feedbackSubmittedAt = Date.now();
      
      await saveApproval(ap);
      await refreshAll(true);
    });
  });
}
